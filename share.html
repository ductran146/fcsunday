<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <script>
    (function(){
      var t = localStorage.getItem('fc-sunday-theme');
      if (t === 'light') document.documentElement.setAttribute('data-theme','light');
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0C0C0F">
  <title>FC Sunday — Tổng quỹ</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js" defer></script>
</head>
<body data-active="share">
<div class="app-shell">
  <div data-component="sidebar"></div>
  <div class="main-content">
    <div data-component="header" data-title="Tổng quỹ"></div>
    <main class="page" id="page-content" style="opacity:0;transition:opacity .2s">

      <!-- Header -->
      <div style="margin-bottom:24px;display:flex;justify-content:center">
        <div style="display:flex;align-items:center;gap:10px">
          <img src="icon-192.png" alt="FC Sunday" style="width:80px;height:80px;object-fit:contain;border-radius:10px;flex-shrink:0">
          <div>
            <h1 class="text-h1" style="text-transform:uppercase;letter-spacing:-.02em;margin:0;line-height:1.1">FC Sunday</h1>
            <div style="font-size:12px;color:var(--text-muted);margin-top:3px" id="share-date">Đang tải…</div>
          </div>
        </div>
      </div>

      <!-- Hero fund -->
      <div class="hero-fund" style="margin-bottom:16px;text-align:center">
        <div class="hero-fund__label" style="text-align:center">Tổng quỹ hiện tại</div>
        <div class="hero-fund__total" style="text-align:center;font-size:40px" id="share-total">—</div>
      </div>

      <!-- KPI nợ -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px">
        <div class="kpi-card kpi-card--red">
          <div class="kpi-card__label">Nợ quỹ tháng</div>
          <div class="kpi-card__value" id="share-thang">—</div>
        </div>
        <div class="kpi-card kpi-card--red">
          <div class="kpi-card__label">Nợ quỹ bia</div>
          <div class="kpi-card__value" id="share-bia">—</div>
        </div>
      </div>

      <!-- Bảng trạng thái thành viên -->
      <div class="card" style="padding:0;overflow:hidden;margin-bottom:20px">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px 12px">
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:18px">💀</span>
            <span class="section-overline" style="color:var(--color-accent)">Trạng thái thành viên</span>
          </div>
          <span class="section-overline" id="debt-month-label" style="color:var(--text-muted)"></span>
        </div>
        <div id="debt-grid" style="display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid var(--bg-border)">
          <div style="grid-column:1/-1;padding:24px;text-align:center;color:var(--text-muted);font-size:13px">Đang tải…</div>
        </div>
      </div>

    </main>
  </div>
  <div data-component="bottom-nav"></div>
</div>
<div data-component="login-modal"></div>
<script src="app.js" defer></script>
<script src="components/components-loader.js" defer></script>
<script>
  const FEE = 200000, FINE = 50000, BASE_YEAR = 2026;

  function fmt(n) {
    if (!n && n !== 0) return '—';
    return new Intl.NumberFormat('vi-VN').format(Math.round(n));
  }

  function toArr(val) {
    if (!val) return [];
    if (Array.isArray(val)) return val.filter(Boolean);
    return Object.values(val).filter(Boolean);
  }

  function normalizeVNText(str) {
    return String(str || '')
      .normalize('NFD')
      .replace(/[̀-ͯ]/g, '')
      .replace(/đ/g, 'd')
      .replace(/Đ/g, 'D')
      .toLowerCase();
  }

  function isOpeningBalanceEntry(c) {
    const text = normalizeVNText([c.cat, c.note, c.title, c.desc].filter(Boolean).join(' '));
    return text.includes('tien dau ky') || text.includes('so du dau ky') || text.includes('dau ky');
  }

  // Firebase trả object → phải toArr() trước khi dùng array methods
  function getLegacyOpeningBalance(S, fund) {
    return toArr(S.chiTieu).reduce((sum, c) => {
      const cFund = (!c.fund || c.fund === 'bong') ? 'thang' : c.fund;
      if (cFund !== fund || !isOpeningBalanceEntry(c)) return sum;
      return sum + Math.abs(Number(c.amount || 0));
    }, 0);
  }

  function getOpeningBalance(S, fund) {
    const legacy = getLegacyOpeningBalance(S, fund);
    const explicit = S?.settings?.openingBalances?.[fund];
    const hasExplicit = explicit !== undefined && explicit !== null && explicit !== '';
    const explicitValue = Number(explicit) || 0;
    if (hasExplicit && explicitValue !== 0) return explicitValue;
    if (legacy !== 0) return legacy;
    return explicitValue;
  }

  function renderShare(S) {
    const now = new Date();
    const YEAR = BASE_YEAR;
    const curMonthIdx = now.getMonth();

    // toArr() bắt buộc vì Firebase lưu array thành object
    const allMembers = toArr(S.members);
    const members    = allMembers.filter(m => m && m.status !== 'left');
    const matches    = toArr(S.matches).filter(m => m && (!m.year || m.year === YEAR));
    const chiTieuAll = toArr(S.chiTieu).filter(c => {
      if (!c) return false;
      const d = c.date?.substring(0, 4);
      return String(YEAR) === d;
    });
    const chiTieu = chiTieuAll.filter(c => !isOpeningBalanceEntry(c));

    const openingThang = getOpeningBalance(S, 'thang');
    const openingBia   = getOpeningBalance(S, 'bia');

    // Thu tháng — dùng allMembers
    let thuThangTotal = 0, noThang = 0;
    allMembers.forEach(m => {
      const key = String(m.id);
      const arr = S.thuThang?.[key] || Array(12).fill(0);
      arr.forEach((v, mi) => {
        if (v === 1) thuThangTotal += FEE;
        if (v === 0 && mi <= curMonthIdx && m.status !== 'left') noThang += FEE;
      });
    });

    // Thu bia
    let thuBiaThu = 0, thuBiaThuThem = 0, noBia = 0;
    matches.forEach(match => {
      toArr(match.losers).forEach(l => {
        if (l.paid) thuBiaThu += FINE;
        else noBia += FINE;
      });
      thuBiaThuThem += (match.thuThem || 0);
    });

    const incomeThangFromExpenses = chiTieu
      .filter(c => (!c.fund || c.fund === 'thang') && Number(c.amount || 0) < 0)
      .reduce((s,c) => s + Math.abs(Number(c.amount || 0)), 0);
    const incomeBiaFromExpenses = chiTieu
      .filter(c => c.fund === 'bia' && Number(c.amount || 0) < 0)
      .reduce((s,c) => s + Math.abs(Number(c.amount || 0)), 0);

    const thuBiaTotal = thuBiaThu + thuBiaThuThem + incomeBiaFromExpenses;

    const chiThang = chiTieu
      .filter(c => (!c.fund || c.fund === 'thang') && Number(c.amount || 0) > 0)
      .reduce((s,c) => s + Number(c.amount || 0), 0);
    const chiBia = chiTieu
      .filter(c => c.fund === 'bia' && Number(c.amount || 0) > 0)
      .reduce((s,c) => s + Number(c.amount || 0), 0);

    const thuThangDisplay = openingThang + thuThangTotal + incomeThangFromExpenses;
    const thuBiaDisplay   = openingBia   + thuBiaTotal;

    const tonThang = thuThangDisplay - chiThang;
    const tonBia   = thuBiaDisplay   - chiBia;
    const tonTotal = tonThang + tonBia;

    // DEBUG
    console.log('=== SHARE DEBUG ===');
    console.log('openingThang:', openingThang, 'openingBia:', openingBia);
    console.log('thuThangTotal:', thuThangTotal, 'chiThang:', chiThang);
    console.log('thuBiaThu:', thuBiaThu, 'thuBiaThuThem:', thuBiaThuThem, 'chiBia:', chiBia);
    console.log('incomeThang:', incomeThangFromExpenses, 'incomeBia:', incomeBiaFromExpenses);
    console.log('thuThangDisplay:', thuThangDisplay, 'thuBiaDisplay:', thuBiaDisplay);
    console.log('tonThang:', tonThang, 'tonBia:', tonBia, 'tonTotal:', tonTotal);
    console.log('allMembers.length:', allMembers.length, 'matches.length:', matches.length, 'chiTieu.length:', chiTieu.length);
    console.log('S.chiTieu type:', typeof S.chiTieu, Array.isArray(S.chiTieu));
    console.log('===================');

    document.getElementById('share-total').textContent = fmt(tonTotal);
    document.getElementById('share-thang').textContent = fmt(noThang);
    document.getElementById('share-bia').textContent   = fmt(noBia);

    document.getElementById('share-date').textContent =
      'Cập nhật ' + now.toLocaleString('vi-VN',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});

    // Debt grid
    const monthNames = ['T1','T2','T3','T4','T5','T6','T7','T8','T9','T10','T11','T12'];
    document.getElementById('debt-month-label').textContent = monthNames[curMonthIdx] + ' tháng';

    const debtMap = {};
    members.forEach(m => {
      let debt = 0;
      const arr = S.thuThang?.[String(m.id)] || Array(12).fill(0);
      const a = Array.isArray(arr) ? arr : Object.values(arr);
      a.forEach((v, mi) => { if (v === 0 && mi <= curMonthIdx && m.status !== 'left') debt += FEE; });
      matches.forEach(match => {
        toArr(match.losers).forEach(l => { if (l.memberId == m.id && !l.paid) debt += FINE; });
      });
      debtMap[m.id] = debt;
    });

    const sorted = [...members].sort((a,b) => (debtMap[b.id]||0) - (debtMap[a.id]||0));

    document.getElementById('debt-grid').innerHTML = sorted.length === 0
      ? '<div style="grid-column:1/-1;padding:24px;text-align:center;color:var(--text-muted);font-size:13px">Chưa có dữ liệu</div>'
      : sorted.map((m, i) => {
          const debt = debtMap[m.id] || 0;
          const br = (i % 4 !== 3) ? '1px solid var(--bg-border)' : 'none';
          return `<div style="padding:6px 6px;text-align:center;border-right:${br};border-bottom:1px solid var(--bg-border)">
            <div style="font-size:12px;font-weight:700;color:var(--text-primary);margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${m.name}</div>
            ${debt === 0
              ? '<div style="font-size:11px;font-weight:600;color:var(--color-success)">Đủ ✓</div>'
              : `<div style="font-size:11px;font-weight:700;color:var(--color-accent-light)">-${fmt(debt)}đ</div>`
            }
          </div>`;
        }).join('');
  }

  window.onComponentsReady = function() {
    document.getElementById('page-content').style.opacity = '1';
  };

  // Nhận data từ app.js khi Firebase load xong
  window._onDataReady = function(S) {
    renderShare(S);
  };
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .catch(err => console.warn('SW register failed:', err));
    });
  }
</script>
</body>
</html>
