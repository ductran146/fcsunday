<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="theme-color" content="#0C0C0F">
  <title>FC Sunday — Chi tiêu</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Chi tiêu card ── */
    .chi-swipe-row {
      position: relative; width: 100%; overflow: hidden;
      border-radius: var(--radius-lg);
    }
    .chi-swipe-card {
      position: relative; z-index: 2; width: 100%;
      will-change: transform; transition: transform .18s ease;
      background: var(--bg-elevated);
      border: 1px solid var(--bg-border);
      border-radius: var(--radius-lg);
      padding: 10px 14px;
    }
    .chi-swipe-card:hover { border-color: var(--bg-stroke); }
    .chi-card-row1 {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 5px;
    }
    .chi-card-row2 {
      display: flex; align-items: center; justify-content: space-between;
      padding-left: 34px; /* indent past STT */
      gap: 8px;
    }
    .chi-card__stt {
      width: 24px; height: 24px; border-radius: var(--radius-full);
      background: var(--bg-stroke); color: var(--text-muted);
      font-size: 11px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .chi-card__info { flex: 1; min-width: 0; }
    .chi-card__cat { font-size: 14px; font-weight: 700; color: var(--text-primary); }
    .chi-card__date { font-size: 12px; color: var(--text-secondary); }
    .chi-card__note { font-size: 12px; color: var(--text-secondary); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .chi-card__amount { font-size: 14px; font-weight: 800; font-variant-numeric: tabular-nums; flex-shrink: 0; }

    /* Swipe action (delete) */
    .chi-swipe-actions {
      position: absolute; inset: 0 0 0 auto; z-index: 1;
      display: flex; align-items: stretch; width: 72px;
    }
    .chi-swipe-del {
      width: 100%; display: flex; align-items: center; justify-content: center;
      background: var(--color-accent); color: #fff;
      border: none; cursor: pointer; border-radius: 0 var(--radius-lg) var(--radius-lg) 0;
      font-size: 20px;
    }
    @media (max-width: 767px) {
      .chi-swipe-row { touch-action: pan-y pinch-zoom; user-select: none; -webkit-user-select: none; }
      .chi-swipe-card { touch-action: pan-y pinch-zoom; }
      .chi-swipe-row.is-open .chi-swipe-card { transform: translate3d(-72px,0,0); }
    }
    @media (min-width: 768px) {
      .chi-swipe-row { overflow: visible; }
      .chi-swipe-actions { display: none; }
      .chi-del-desktop { display: inline-flex !important; }
    }
  </style>
  <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>
</head>
<body data-active="chi-tieu">
<div class="app-shell">
  <div data-component="sidebar"></div>
  <div class="main-content">
    <div data-component="header" data-title="Chi tiêu"></div>
    <main class="page" id="page-content" style="opacity:0;transition:opacity .2s">

      <div class="thu-thang-page-header">
        <div class="thu-thang-page-title">
          <div class="section-overline">Quản lý</div>
          <h1 class="text-h1">Chi tiêu</h1>
        </div>
        <select class="year-selector thu-thang-year-selector" id="year-select">
          <!-- options injected by JS -->
        </select>
      </div>

      <!-- Tabs toggle: chỉ hiện khi login, nằm trên KPI -->
      <div id="chi-tabs" style="display:none;margin-bottom:16px">
        <div class="toggle-tab-group">
          <button class="toggle-tab active" id="tab-history" onclick="setChiTab('history')">Lịch sử chi tiêu</button>
          <button class="toggle-tab" id="tab-add" onclick="setChiTab('add')">
            <iconify-icon icon="solar:add-circle-linear" style="font-size:14px;vertical-align:middle;margin-right:4px"></iconify-icon>Thêm khoản
          </button>
        </div>
      </div>

      <!-- KPI -->
      <div class="grid-3" id="chi-kpi" style="margin-bottom:24px">
        <div class="kpi-card kpi-card--red">
          <div class="kpi-card__label">Tổng chi</div>
          <div class="kpi-card__value" id="kpi-tong-chi">0</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-card__label">Chi từ quỹ tháng</div>
          <div class="kpi-card__value" id="kpi-chi-thang">0</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-card__label">Chi từ quỹ bia</div>
          <div class="kpi-card__value" id="kpi-chi-bia">0</div>
        </div>
      </div>

      <!-- Panel: Lịch sử (luôn hiện) -->
      <div id="panel-history">
        <!-- Chart full width -->
        <div class="card" style="margin-bottom:16px">
          <div class="section-overline" style="margin-bottom:4px">Thống kê</div>
          <div class="section-title" style="font-size:16px;margin-bottom:16px">Phân bổ theo danh mục</div>
          <div style="display:flex;flex-direction:column;align-items:center;gap:16px">
            <div style="position:relative;width:220px;height:220px">
              <canvas id="donut-chart"></canvas>
              <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;flex-direction:column">
                <div style="font-size:12px;color:var(--text-muted)">Tổng</div>
                <div style="font-size:20px;font-weight:800;color:var(--text-primary)" id="chart-center-val">0</div>
              </div>
            </div>
            <div id="chart-legend" class="chart-legend" style="width:100%;justify-content:flex-start"></div>
          </div>
        </div>
        <!-- History table -->
        <div class="card-no-border" style="padding:0;overflow:hidden">
          <div style="padding:20px 0 0;display:flex;align-items:center;justify-content:space-between">
            <div>
              <div class="section-overline" style="margin-bottom:4px">Lịch sử</div>
              <div class="section-title" style="font-size:16px">Tất cả khoản chi</div>
            </div>
            <select class="input input-h40" id="filter-fund" style="width:auto;padding-right:36px;min-width:120px">
              <option value="">Tất cả quỹ</option>
              <option value="thang">Quỹ tháng</option>
              <option value="bia">Quỹ bia</option>
            </select>
          </div>
          <div id="chi-list" style="display:flex;flex-direction:column;gap:8px;padding: 16px 0px 0 0"></div>
        </div>
      </div><!-- /panel-history -->

      <!-- Tab: Thêm khoản (admin only) -->
      <div id="panel-add" style="display:none">
        <div class="card">
          <div class="section-overline" style="margin-bottom:4px">Thêm khoản</div>
          <div class="section-title" style="font-size:16px;margin-bottom:16px">Ghi nhận chi tiêu</div>
          <div style="display:flex;flex-direction:column;gap:14px">
            <div class="field">
              <label>Ngày chi</label>
              <button type="button" class="input" id="chi-date-btn"
                style="text-align:left;cursor:pointer;display:flex;align-items:center;gap:8px;color:var(--text-primary)"
                onclick="window.DatePicker?.open('chi-date-value','chi-date-display')">
                <iconify-icon icon="solar:calendar-linear" style="font-size:18px;color:var(--text-muted);flex-shrink:0"></iconify-icon>
                <span id="chi-date-display">Chọn ngày</span>
              </button>
              <input type="hidden" id="chi-date-value">
            </div>
            <div class="field">
              <label>Số tiền <span style="color:var(--text-muted);font-weight:400">(âm = cộng lại quỹ)</span></label>
              <input type="number" class="input" id="chi-amount" placeholder="VD: 500000">
            </div>
            <div class="field">
              <label>Danh mục</label>
              <select class="input" id="chi-cat">
                <option value="Sân bóng">⚽ Sân bóng</option>
                <option value="Thiết bị">🎽 Thiết bị</option>
                <option value="Liên hoan">🎉 Liên hoan</option>
                <option value="Y tế">🏥 Y tế</option>
                <option value="Phần thưởng">🏆 Phần thưởng</option>
                <option value="Khác">📦 Khác</option>
              </select>
            </div>
            <div class="field">
              <label>Nguồn quỹ</label>
              <select class="input" id="chi-fund">
                <option value="thang">Quỹ tháng</option>
                <option value="bia">Quỹ bia</option>
              </select>
            </div>
            <div class="field">
              <label>Ghi chú</label>
              <input type="text" class="input" id="chi-note" placeholder="Mô tả khoản chi">
            </div>
            <button class="btn btn-gold w-full" id="btn-add-chi" style="justify-content:center;font-size:15px">
              <iconify-icon icon="solar:add-circle-linear" style="font-size:18px"></iconify-icon>
              Thêm khoản chi
            </button>
          </div>
        </div>
      </div><!-- /panel-add -->
  </div>
  <div data-component="bottom-nav"></div>
</div>
<div data-component="login-modal"></div>
<script>
/* ── Inline DatePicker ── */
window.DatePicker=(function(){'use strict';const MV=['Tháng 1','Tháng 2','Tháng 3','Tháng 4','Tháng 5','Tháng 6','Tháng 7','Tháng 8','Tháng 9','Tháng 10','Tháng 11','Tháng 12'];const DOW=['CN','T2','T3','T4','T5','T6','T7'];let _y,_m,_sel,_hid,_dis;function fmtVN(d){if(!d)return'Chọn ngày';const[y,m,dd]=d.split('-');return`${parseInt(dd)} ${MV[parseInt(m)-1]}, ${y}`;}function setVal(d){const h=document.getElementById(_hid),s=document.getElementById(_dis);if(h)h.value=d;if(s){s.textContent=fmtVN(d);s.style.color=d?'var(--text-primary)':'var(--text-muted)';}}function render(){const lb=document.getElementById('_dp_label');if(lb)lb.textContent=`${MV[_m]}, ${_y}`;const g=document.getElementById('_dp_days');if(!g)return;const fd=new Date(_y,_m,1).getDay(),dim=new Date(_y,_m+1,0).getDate(),ts=new Date().toISOString().slice(0,10);let h='';for(let i=0;i<fd;i++)h+='<div></div>';for(let d=1;d<=dim;d++){const ds=`${_y}-${String(_m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;const isSel=ds===_sel,isTod=ds===ts;let bg='transparent',col='var(--text-primary)',fw='500';if(isSel){bg='var(--color-primary)';col='#1a1206';fw='800';}else if(isTod){bg='rgba(255,192,46,.15)';col='var(--color-primary)';fw='700';}h+=`<button type="button" style="padding:9px 0;text-align:center;font-size:13px;font-weight:${fw};border:none;cursor:pointer;border-radius:var(--radius-md);background:${bg};color:${col};font-family:var(--font-sans)" onclick="DatePicker._pick('${ds}')">${d}</button>`;}g.innerHTML=h;}function ensure(){if(document.getElementById('_dp_modal'))return;const el=document.createElement('div');el.className='modal-backdrop';el.id='_dp_modal';el.style.display='none';el.innerHTML=`<div class="modal fade-in" style="max-width:340px;padding:20px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px"><button class="btn btn-icon btn-ghost" onclick="DatePicker._prev()"><iconify-icon icon="solar:arrow-left-linear" style="font-size:18px"></iconify-icon></button><div style="font-size:15px;font-weight:700" id="_dp_label"></div><button class="btn btn-icon btn-ghost" onclick="DatePicker._next()"><iconify-icon icon="solar:arrow-right-linear" style="font-size:18px"></iconify-icon></button></div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px">${DOW.map(d=>`<div style="text-align:center;font-size:11px;font-weight:700;color:var(--text-muted);padding:4px">${d}</div>`).join('')}</div><div id="_dp_days" style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px"></div><div style="display:flex;justify-content:space-between;margin-top:14px"><button class="btn btn-ghost btn-sm" onclick="DatePicker._today()">Hôm nay</button><button class="btn btn-ghost btn-sm" onclick="DatePicker.close()">Đóng</button></div></div>`;el.addEventListener('click',e=>{if(e.target===el)DatePicker.close();});document.body.appendChild(el);}return{init(b,h,d,def){ensure();_hid=h;_dis=d;setVal(def||new Date().toISOString().slice(0,10));},open(h,d){ensure();_hid=h;_dis=d;const c=document.getElementById(h)?.value;const r=c?new Date(c+'T00:00:00'):new Date();_y=r.getFullYear();_m=r.getMonth();_sel=c||'';render();document.getElementById('_dp_modal').style.display='flex';},close(){const m=document.getElementById('_dp_modal');if(m)m.style.display='none';},_pick(d){_sel=d;setVal(d);this.close();},_prev(){_m--;if(_m<0){_m=11;_y--;}render();},_next(){_m++;if(_m>11){_m=0;_y++;}render();},_today(){const t=new Date();_y=t.getFullYear();_m=t.getMonth();_sel=t.toISOString().slice(0,10);render();},getValue(h){return document.getElementById(h)?.value||'';},setValue(h,d,v){_hid=h;_dis=d;setVal(v);}};})();
</script>
<script src="app.js" defer></script>
<script src="components/components-loader.js" defer></script>
<script>
  const CATS = ['Sân bóng','Thiết bị','Liên hoan','Y tế','Phần thưởng','Khác'];
  const CAT_COLORS = ['#E0392C','#FFC02E','#2ECC71','#FF6A5E','#F5891F','#9A9AA2'];
  const BASE_YEAR = 2026;
  let _year = BASE_YEAR, _S = null, _chart = null;

  function fmt(n) { return new Intl.NumberFormat('vi-VN').format(Math.round(n||0)) + ''; }

  function getChiTieu(S) {
    return (S.chiTieu||[]).filter(c => {
      const y = parseInt(c.date?.substring(0,4));
      return y === _year;
    });
  }

  function renderChart(chiTieu) {
    const catTotals = {};
    chiTieu.forEach(c => { if (c.amount > 0) catTotals[c.cat] = (catTotals[c.cat]||0) + c.amount; });
    const labels = Object.keys(catTotals);
    const data   = Object.values(catTotals);
    const total  = data.reduce((s,v) => s+v, 0);

    document.getElementById('chart-center-val').textContent =
      total >= 1e6 ? (total/1e6).toFixed(1)+'M' : new Intl.NumberFormat('vi-VN').format(total);

    const ctx = document.getElementById('donut-chart').getContext('2d');
    if (_chart) _chart.destroy();
    if (!total) {
      document.getElementById('chart-legend').innerHTML = '<span style="color:var(--text-muted);font-size:13px">Chưa có dữ liệu</span>';
      return;
    }
    _chart = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels,
        datasets: [{ data, backgroundColor: labels.map(l => CAT_COLORS[CATS.indexOf(l)] || '#5D5D66'), borderWidth: 2, borderColor: 'var(--bg-surface)', borderRadius: 6, spacing: 2 }]
      },
      options: {
        cutout: '70%',
        plugins: { legend: { display: false }, tooltip: {
          callbacks: { label: ctx => ` ${ctx.label}: ${fmt(ctx.raw)}` }
        }}
      }
    });

    document.getElementById('chart-legend').innerHTML = labels.map((l,i) => `
      <div class="chart-legend-item">
        <div class="chart-legend-dot" style="background:${CAT_COLORS[CATS.indexOf(l)]||'#5D5D66'}"></div>
        ${l}: ${fmt(data[i])}
      </div>`).join('');
  }

  function renderPage(S) {
    _S = S;
    const isAdmin = window._isLoggedIn?.();
    let chiTieu = getChiTieu(S);
    const filterFund = document.getElementById('filter-fund')?.value || '';
    const filtered = filterFund ? chiTieu.filter(c => c.fund === filterFund) : chiTieu;

    // KPI
    const tong = chiTieu.reduce((s,c)=>s+(c.amount||0),0);
    const chiThang = chiTieu.filter(c=>!c.fund||c.fund==='thang').reduce((s,c)=>s+(c.amount||0),0);
    const chiBia   = chiTieu.filter(c=>c.fund==='bia').reduce((s,c)=>s+(c.amount||0),0);
    document.getElementById('kpi-tong-chi').textContent  = fmt(tong);
    document.getElementById('kpi-chi-thang').textContent = fmt(chiThang);
    document.getElementById('kpi-chi-bia').textContent   = fmt(chiBia);

    renderChart(chiTieu);

    // Admin card
    // Tabs chỉ hiện khi admin; chưa login ẩn tabs
    const chiTabs = document.getElementById('chi-tabs');
    const tabAdd  = document.getElementById('tab-add');
    if (isAdmin) {
      if (chiTabs) chiTabs.style.display = 'flex';
    } else {
      if (chiTabs) chiTabs.style.display = 'none';
      // reset về lịch sử khi logout
      setChiTab('history');
    }
    const thActions = document.getElementById('th-actions');
    if (thActions) thActions.style.display = isAdmin ? '' : 'none';

    // Card list
    const list = document.getElementById('chi-list');
    if (!filtered.length) {
      list.innerHTML = `<div class="empty-state" style="padding:32px 0">
        <div class="empty-state__icon"><iconify-icon icon="solar:bill-list-linear" style="font-size:40px"></iconify-icon></div>
        <div class="empty-state__desc">Chưa có khoản chi nào</div>
      </div>`;
      return;
    }
    const sorted = [...filtered].sort((a,b) => (b.date||'').localeCompare(a.date||''));
    list.innerHTML = sorted.map((c, i) => {
      const d = c.date ? (() => { const [y,m,dd]=c.date.split('-'); return `${dd}/${m}/${y}`; })() : '—';
      const amtColor = c.amount < 0 ? 'var(--color-success)' : 'var(--color-accent-light)';
      const amtLabel = (c.amount < 0 ? '+' : '-') + fmt(Math.abs(c.amount));
      const fundBadge = c.fund === 'bia'
        ? '<span class="badge badge-warning">Quỹ bia</span>'
        : '<span class="badge badge-neutral">Quỹ tháng</span>';
      return `<div class="chi-swipe-row" data-cid="${c.id}">
        <div class="chi-swipe-actions">
          <button class="chi-swipe-del" onclick="deleteChiTieu(${c.id})" title="Xoá">
            <iconify-icon icon="solar:trash-bin-trash-linear"></iconify-icon>
          </button>
        </div>
        <div class="chi-swipe-card">
          <!-- Row 1: STT · Hạng mục + ngày ··· badge quỹ -->
          <div class="chi-card-row1">
            <div class="chi-card__stt">${sorted.length - i}</div>
            <div class="chi-card__info">
              <div class="chi-card__cat">${c.cat||'—'}</div>
              <div class="chi-card__date">${d}</div>
            </div>
            ${fundBadge}
            ${isAdmin ? `<button class="btn btn-icon btn-ghost" onclick="deleteChiTieu(${c.id})" style="color:var(--text-muted);width:30px;height:30px;display:none" class="chi-del-desktop">
              <iconify-icon icon="solar:trash-bin-trash-linear" style="font-size:15px"></iconify-icon>
            </button>` : ''}
          </div>
          <!-- Row 2: nội dung · số tiền -->
          <div class="chi-card-row2">
            <div class="chi-card__note">${c.note||'—'}</div>
            <div class="chi-card__amount" style="color:${amtColor}">${amtLabel}</div>
          </div>
        </div>
      </div>`;
    }).join('');
    requestAnimationFrame(setupChiSwipe);
  }

  window.deleteChiTieu = function(id) {
    if (!window._isLoggedIn?.() || !_S) return;
    const c = (_S.chiTieu||[]).find(x=>x.id==id);
    const label = c?.cat || `#${id}`;
    const backdrop = document.createElement('div');
    backdrop.className = 'modal-backdrop';
    backdrop.innerHTML = `<div class="modal fade-in" style="max-width:360px;text-align:center">
      <div style="width:52px;height:52px;border-radius:var(--radius-full);background:rgba(224,57,44,.12);border:1.5px solid rgba(224,57,44,.3);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:22px">
        <iconify-icon icon="solar:trash-bin-trash-linear" style="color:var(--color-accent-light)"></iconify-icon>
      </div>
      <div style="font-size:17px;font-weight:700;margin-bottom:8px">Xoá khoản chi?</div>
      <div style="font-size:13px;color:var(--text-secondary);margin-bottom:20px"><strong style="color:var(--text-primary)">${label}</strong> sẽ bị xoá vĩnh viễn.</div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-surface w-full" id="_chi_del_cancel" style="justify-content:center">Huỷ</button>
        <button class="btn w-full" id="_chi_del_ok" style="justify-content:center;background:var(--color-accent);color:#fff">
          <iconify-icon icon="solar:trash-bin-trash-linear" style="font-size:16px"></iconify-icon>Xoá
        </button>
      </div>
    </div>`;
    document.body.appendChild(backdrop);
    const close = () => backdrop.remove();
    backdrop.addEventListener('click', e => { if(e.target===backdrop) close(); });
    document.getElementById('_chi_del_cancel').addEventListener('click', close);
    document.getElementById('_chi_del_ok').addEventListener('click', () => {
      _S.chiTieu = (_S.chiTieu||[]).filter(x=>x.id!=id);
      window._saveS?.(_S);
      close();
      renderPage(_S);
    });
  };

  function updateYearUI() {
    const sel = document.getElementById('year-select');
    if (sel) {
      const curY = new Date().getFullYear();
      const minY = BASE_YEAR, maxY = Math.max(curY + 1, BASE_YEAR);
      sel.innerHTML = '';
      for (let y = maxY; y >= minY; y--) {
        const opt = document.createElement('option');
        opt.value = y; opt.textContent = y;
        if (y === _year) opt.selected = true;
        sel.appendChild(opt);
      }
    }
    window._currentYear = _year;
  }

  let _activeChiTab = 'history';
  window.setChiTab = function(tab) {
    _activeChiTab = tab;
    document.getElementById('panel-history').style.display = tab === 'history' ? 'block' : 'none';
    document.getElementById('panel-add').style.display     = tab === 'add'     ? 'block' : 'none';
    document.getElementById('tab-history').classList.toggle('active', tab === 'history');
    document.getElementById('tab-add').classList.toggle('active', tab === 'add');
    // Ẩn KPI khi đang ở tab thêm khoản
    const kpiEl = document.getElementById('chi-kpi');
    if (kpiEl) kpiEl.style.display = tab === 'add' ? 'none' : '';
  };

  window.onComponentsReady = function() {
    updateYearUI();
    document.getElementById('year-select')?.addEventListener('change', (e) => {
      _year = parseInt(e.target.value) || BASE_YEAR;
      updateYearUI(); if(_S) renderPage(_S);
    });
    document.getElementById('filter-fund')?.addEventListener('change', () => { if(_S) renderPage(_S); });

    // Init date picker với ngày hôm nay
    window.DatePicker?.init('chi-date-btn', 'chi-date-value', 'chi-date-display');

    document.getElementById('btn-add-chi')?.addEventListener('click', () => {
      if (!_S || !window._isLoggedIn?.()) return;
      const date   = document.getElementById('chi-date-value').value;
      const amount = parseFloat(document.getElementById('chi-amount').value);
      const cat    = document.getElementById('chi-cat').value;
      const fund   = document.getElementById('chi-fund').value;
      const note   = document.getElementById('chi-note').value.trim();
      if (!date || isNaN(amount)) { alert('Vui lòng điền đủ thông tin'); return; }
      if (!_S.chiTieu) _S.chiTieu = [];
      const newId = (_S.nextCid || 1);
      _S.chiTieu.push({ id: newId, date, amount, cat, fund, note });
      _S.nextCid = newId + 1;
      window._saveS?.(_S);
      document.getElementById('chi-amount').value = '';
      document.getElementById('chi-note').value   = '';
      window.DatePicker?.init('chi-date-btn','chi-date-value','chi-date-display'); // reset về hôm nay
      renderPage(_S);
      setChiTab('history');
    });

    document.getElementById('page-content').style.opacity = '1';
  };
  function setupChiSwipe() {
    const isMobile = window.matchMedia?.('(max-width:767px)').matches;
    if (!isMobile) return;
    document.querySelectorAll('.chi-swipe-row').forEach(row => {
      const card = row.querySelector('.chi-swipe-card');
      if (!card) return;
      const SWIPE_W = 72;
      let startX=0, startY=0, baseX=0, dragging=false;
      const clamp = v => Math.max(-SWIPE_W, Math.min(0, v));
      const setX = x => card.style.transform = `translate3d(${x}px,0,0)`;
      const openRow  = () => { row.classList.add('is-open');    setX(-SWIPE_W); };
      const closeRow = () => { row.classList.remove('is-open'); card.style.transform=''; };

      card.addEventListener('touchstart', e => {
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
        baseX  = row.classList.contains('is-open') ? -SWIPE_W : 0;
        dragging = false;
        card.style.transition = 'none';
      }, {passive:true});

      card.addEventListener('touchmove', e => {
        const dx = e.touches[0].clientX - startX;
        const dy = e.touches[0].clientY - startY;
        if (!dragging && Math.abs(dy) > Math.abs(dx)) return;
        dragging = true;
        setX(clamp(baseX + dx));
      }, {passive:true});

      card.addEventListener('touchend', e => {
        card.style.transition = '';
        if (!dragging) { if (row.classList.contains('is-open')) closeRow(); return; }
        const dx = e.changedTouches[0].clientX - startX;
        if (baseX === 0 && dx < -30) openRow();
        else if (baseX === -SWIPE_W && dx > 20) closeRow();
        else baseX === -SWIPE_W ? openRow() : closeRow();
      });
    });
  }

  window._onDataReady = function(S) { renderPage(S); };
  window._onAuthChange = function() { if(_S) renderPage(_S); };
</script>
