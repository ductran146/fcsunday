<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="theme-color" content="#0C0C0F">
  <title>FC Sunday — Thành viên</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js" defer></script>
</head>
<body data-active="thanh-vien">
<div class="app-shell">
  <div data-component="sidebar"></div>
  <div class="main-content">
    <div data-component="header" data-title="Thành viên"></div>
    <main class="page" id="page-content" style="opacity:0;transition:opacity .2s">

      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;gap:12px;flex-wrap:wrap">
        <div>
          <div class="section-overline">Đội hình</div>
          <h1 class="text-h1">Thành viên</h1>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="year-selector"><iconify-icon icon="solar:calendar-linear" style="font-size:14px"></iconify-icon><span id="year-text">2026</span></div>
        </div>
      </div>

      <!-- KPI -->
      <div class="grid-2 member-kpi-grid" style="margin-bottom:24px">
        <div class="kpi-card">
          <div class="kpi-card__label">Đang hoạt động</div>
          <div class="kpi-card__value" id="kpi-active">0</div>
        </div>
        <div class="kpi-card kpi-card--red">
          <div class="kpi-card__label">Chưa đóng tháng</div>
          <div class="kpi-card__value" id="kpi-chua-dong">0</div>
        </div>
        <div class="kpi-card kpi-card--red">
          <div class="kpi-card__label">Tổng nợ tháng</div>
          <div class="kpi-card__value" id="kpi-no-thang">0</div>
        </div>
        <div class="kpi-card kpi-card--red">
          <div class="kpi-card__label">Tổng nợ bia</div>
          <div class="kpi-card__value" id="kpi-no-bia">0</div>
        </div>
      </div>

      <!-- Filter tabs -->
      <div class="member-filter-tabs">
        <button class="month-tab active" id="tab-all"      onclick="setFilter('all')">Tất cả</button>
        <button class="month-tab"        id="tab-active"   onclick="setFilter('active')">Đang hoạt động</button>
        <button class="month-tab"        id="tab-inactive" onclick="setFilter('inactive')">Tạm nghỉ</button>
        <button class="month-tab"        id="tab-left"     onclick="setFilter('left')">Đã nghỉ</button>
      </div>
      <style>
        .month-tab { padding:7px 14px; border-radius:var(--radius-full); font-size:13px; font-weight:600; background:var(--bg-elevated); color:var(--text-secondary); border:1px solid var(--bg-border); cursor:pointer; transition:background .12s,color .12s,border-color .12s; }
        .month-tab.active { background:rgba(255,192,46,.15); color:var(--color-primary); border-color:rgba(255,192,46,.3); }
      </style>

      <!-- Search + add -->
      <div class="member-toolbar">
        <input class="input member-search-input" id="member-search" type="search" placeholder="Tìm thành viên..." autocomplete="off">
        <button class="btn btn-gold member-add-btn" id="btn-add-member" type="button">
          <iconify-icon icon="solar:add-circle-linear" class="member-add-btn__icon" aria-hidden="true"></iconify-icon>
          Thêm
        </button>
      </div>

      <!-- Sort filters -->
      <div class="member-sort-bar" aria-label="Sắp xếp danh sách thành viên">
        <button class="member-sort-chip" type="button" data-sort-key="soTran" onclick="setMemberSort('soTran')">
          <span>Trận thua</span>
          <iconify-icon icon="solar:sort-vertical-linear" aria-hidden="true"></iconify-icon>
        </button>
        <button class="member-sort-chip" type="button" data-sort-key="noThang" onclick="setMemberSort('noThang')">
          <span>Nợ quỹ tháng</span>
          <iconify-icon icon="solar:sort-vertical-linear" aria-hidden="true"></iconify-icon>
        </button>
        <button class="member-sort-chip" type="button" data-sort-key="noBia" onclick="setMemberSort('noBia')">
          <span>Nợ quỹ bia</span>
          <iconify-icon icon="solar:sort-vertical-linear" aria-hidden="true"></iconify-icon>
        </button>
        <button class="member-sort-chip" type="button" data-sort-key="total" onclick="setMemberSort('total')">
          <span>Tổng nợ</span>
          <iconify-icon icon="solar:sort-vertical-linear" aria-hidden="true"></iconify-icon>
        </button>
      </div>

      <!-- Member list -->
      <div id="member-list" style="display:flex;flex-direction:column;gap:8px"></div>

    </main>
  </div>
  <div data-component="bottom-nav"></div>
</div>

<!-- Add member modal -->
<div class="sheet-backdrop" id="add-member-modal" style="display:none">
  <div class="sheet fade-in">
    <div class="modal-handle"></div>
    <h2 class="modal-title" id="member-modal-title">Thêm thành viên</h2>
    <div style="display:flex;flex-direction:column;gap:12px">
      <div class="field">
        <label>Họ tên</label>
        <input type="text" class="input" id="member-name" placeholder="Nguyễn Văn A">
      </div>
      <div class="field">
        <label>Số điện thoại</label>
        <input type="tel" class="input" id="member-phone" placeholder="0901234567">
      </div>
      <div class="field">
        <label>Trạng thái</label>
        <select class="input" id="member-status">
          <option value="active">Đang hoạt động</option>
          <option value="inactive">Tạm nghỉ</option>
          <option value="left">Đã nghỉ</option>
        </select>
      </div>
      <div class="field">
        <label>Ghi chú</label>
        <input type="text" class="input" id="member-note" placeholder="">
      </div>
      <input type="hidden" id="member-edit-id">
      <div class="member-modal-actions">
        <button class="btn btn-ghost" id="btn-cancel-member" type="button">Huỷ</button>
        <button class="btn btn-primary" id="btn-save-member" type="button">
          <iconify-icon icon="solar:check-circle-linear" style="font-size:18px"></iconify-icon>
          Lưu
        </button>
      </div>
    </div>
  </div>
</div>

<div data-component="login-modal"></div>
<script src="app.js" defer></script>
<script src="components/components-loader.js" defer></script>
<script>
  const FEE = 200000, FINE = 50000, BASE_YEAR = 2026;
  let _year = BASE_YEAR, _S = null, _filter = 'all', _query = '', _sortKey = 'name', _sortDir = 'asc';

  function fmt(n) { return new Intl.NumberFormat('vi-VN').format(Math.round(n||0)); }
  function fmtK(n) {
    const value = Math.round(n || 0);
    if (value === 0) return '0';
    return new Intl.NumberFormat('vi-VN').format(Math.round(value / 1000)) + 'K';
  }
  function moneyChip(n) {
    const value = Math.round(n || 0);
    return `<span class="money-full">${fmt(value)}</span><span class="money-k">${fmtK(value)}</span>`;
  }

  function normalizeText(value) {
    return String(value || '')
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '')
      .replace(/đ/g, 'd')
      .replace(/Đ/g, 'D')
      .toLowerCase()
      .trim();
  }

  const viCollator = new Intl.Collator('vi', { sensitivity: 'base', numeric: true });

  function updateSortButtons() {
    document.querySelectorAll('.member-sort-chip').forEach(btn => {
      const key = btn.dataset.sortKey;
      const active = key === _sortKey && _sortKey !== 'name';
      btn.classList.toggle('active', active);
      btn.classList.toggle('sort-asc', active && _sortDir === 'asc');
      btn.classList.toggle('sort-desc', active && _sortDir === 'desc');
      const icon = btn.querySelector('iconify-icon');
      if (icon) {
        icon.setAttribute('icon', active
          ? (_sortDir === 'asc' ? 'solar:arrow-up-linear' : 'solar:arrow-down-linear')
          : 'solar:sort-vertical-linear');
      }
      btn.setAttribute('aria-pressed', active ? 'true' : 'false');
    });
  }

  function compareMembers(a, b, debtCache) {
    const nameCompare = viCollator.compare(a.name || '', b.name || '');
    if (_sortKey === 'name') return nameCompare;

    const da = debtCache.get(a.id) || { soTran: 0, noThang: 0, noBia: 0, total: 0 };
    const db = debtCache.get(b.id) || { soTran: 0, noThang: 0, noBia: 0, total: 0 };
    const av = Number(da[_sortKey] || 0);
    const bv = Number(db[_sortKey] || 0);
    const valueCompare = _sortDir === 'asc' ? av - bv : bv - av;
    return valueCompare || nameCompare;
  }

  const STATUS_LABEL = { active:'Đang hoạt động', inactive:'Tạm nghỉ', left:'Đã nghỉ' };
  const STATUS_BADGE = {
    active:   '<span class="badge badge-success">Hoạt động</span>',
    inactive: '<span class="badge badge-warning">Tạm nghỉ</span>',
    left:     '<span class="badge badge-muted">Đã nghỉ</span>',
  };

  function isMonthCountedForDebt(monthIdx) {
    const now = new Date();
    const currentYear = now.getFullYear();
    const currentMonthIdx = now.getMonth();
    if (_year < currentYear) return true;
    if (_year > currentYear) return false;
    return monthIdx <= currentMonthIdx;
  }

  function calcDebt(S, member) {
    const yearKey = _year === BASE_YEAR ? String(member.id) : `${member.id}_${_year}`;
    const arr = (S.thuThang?.[yearKey] || Array(12).fill(0)).slice(0, 12);
    while (arr.length < 12) arr.push(0);

    // Chỉ tính nợ các tháng đã đến hạn.
    // Các tháng tương lai vẫn có thể đánh dấu đóng trước ở trang Thu tháng,
    // nhưng trạng thái chưa đóng của tháng tương lai không được cộng vào nợ.
    const noThang = arr.reduce((sum, v, monthIdx) => {
      return sum + (v === 0 && isMonthCountedForDebt(monthIdx) ? FEE : 0);
    }, 0);

    const matches = (S.matches||[]).filter(m => {
      const yr = _year === BASE_YEAR ? (!m.year || m.year === BASE_YEAR) : m.year === _year;
      return yr;
    });
    const noBia = matches.reduce((s, m) => {
      const l = (m.losers||[]).find(l => l.memberId == member.id);
      return s + (l && !l.paid ? FINE : 0);
    }, 0);

    const soTran = matches.filter(m => (m.losers||[]).some(l=>l.memberId==member.id)).length;

    return { noThang, noBia, total: noThang + noBia, soTran };
  }

  function renderPage(S) {
    _S = S;
    const isAdmin = window._isLoggedIn?.();

    document.getElementById('year-text').textContent = _year;

    const all = S.members || [];
    const active = all.filter(m => m.status !== 'left');

    // KPI
    let noThangTotal = 0, noBiaTotal = 0, chuaDongCount = 0;
    active.forEach(m => {
      const d = calcDebt(S, m);
      noThangTotal += d.noThang;
      noBiaTotal   += d.noBia;
      if (d.noThang > 0) chuaDongCount += 1;
    });
    document.getElementById('kpi-active').textContent    = all.filter(m=>m.status==='active').length;
    document.getElementById('kpi-chua-dong').textContent = chuaDongCount;
    document.getElementById('kpi-no-thang').textContent  = fmt(noThangTotal);
    document.getElementById('kpi-no-bia').textContent    = fmt(noBiaTotal);

    // Filter + search + sort
    const normalizedQuery = normalizeText(_query);
    const byStatus = _filter === 'all' ? all : all.filter(m => m.status === _filter);
    const searched = normalizedQuery
      ? byStatus.filter(m => normalizeText(m.name).includes(normalizedQuery))
      : byStatus;
    const debtCache = new Map();
    searched.forEach(m => debtCache.set(m.id, calcDebt(S, m)));
    const show = searched.slice().sort((a, b) => compareMembers(a, b, debtCache));
    updateSortButtons();

    const el = document.getElementById('member-list');
    if (!show.length) {
      el.innerHTML = `<div class="empty-state">
        <div class="empty-state__icon"><iconify-icon icon="solar:users-group-rounded-linear" style="font-size:48px"></iconify-icon></div>
        <div class="empty-state__title">${_query ? 'Không tìm thấy thành viên' : 'Chưa có thành viên'}</div>
      </div>`;
      return;
    }

    el.innerHTML = show.map(m => {
      const d = debtCache.get(m.id) || calcDebt(S, m);
      const monthDebtClass = d.noThang > 0 ? 'is-debt' : 'is-clear';
      const beerDebtClass = d.noBia > 0 ? 'is-debt' : 'is-clear';
      const totalDebtClass = d.total > 0 ? 'is-debt' : 'is-clear';

      return `<div class="member-swipe-row fade-in">
        <div class="member-swipe-actions">
          <button class="member-swipe-action member-swipe-action--edit" type="button" onclick="event.stopPropagation(); editMember(${m.id}); closeMemberSwipeRows();" title="Sửa thông tin" aria-label="Sửa thông tin">
            <iconify-icon icon="solar:pen-2-linear"></iconify-icon>
            <span class="member-swipe-action__text">Sửa thông tin</span>
          </button>
          <button class="member-swipe-action member-swipe-action--pay" type="button" onclick="event.stopPropagation(); payMember(${m.id});" title="Thanh toán" aria-label="Thanh toán">
            <iconify-icon icon="solar:wallet-money-linear"></iconify-icon>
            <span class="member-swipe-action__text">Thanh toán</span>
          </button>
        </div>
        <div class="member-row member-detail-card member-swipe-card">
          <div class="member-detail-card__top">
            <div class="member-row__name">${m.name}</div>
            <div class="member-detail-card__status">
              ${STATUS_BADGE[m.status] || ''}
            </div>
          </div>
          <div class="member-detail-card__meta-row">
            <span class="member-debt-pill member-debt-pill--match">${d.soTran} thua</span>
            <span class="member-debt-pill member-debt-pill--month ${monthDebtClass}">Tháng: ${moneyChip(d.noThang)}</span>
            <span class="member-debt-pill member-debt-pill--beer ${beerDebtClass}">Bia: ${moneyChip(d.noBia)}</span>
            <span class="member-debt-pill member-debt-pill--total ${totalDebtClass}">Σ: ${moneyChip(d.total)}</span>
          </div>
        </div>
      </div>`;
    }).join('');
    setupMemberSwipeActions();
  }

  function closeMemberSwipeRows(exceptRow) {
    document.querySelectorAll('.member-swipe-row.is-open').forEach(row => {
      if (row !== exceptRow) row.classList.remove('is-open');
    });
  }

  window.closeMemberSwipeRows = closeMemberSwipeRows;

  function showAppNotice(message, title = 'Thông báo') {
    const old = document.querySelector('.app-notice-backdrop');
    if (old) old.remove();

    const backdrop = document.createElement('div');
    backdrop.className = 'app-notice-backdrop';
    backdrop.innerHTML = `
      <div class="app-notice" role="dialog" aria-modal="true" aria-labelledby="app-notice-title">
        <div class="app-notice__icon">
          <iconify-icon icon="solar:info-circle-linear"></iconify-icon>
        </div>
        <div class="app-notice__content">
          <div class="app-notice__title" id="app-notice-title">${title}</div>
          <div class="app-notice__message">${message}</div>
        </div>
        <button class="btn btn-gold app-notice__button" type="button">Đóng</button>
      </div>`;

    const close = () => backdrop.remove();
    backdrop.querySelector('.app-notice__button')?.addEventListener('click', close);
    backdrop.addEventListener('click', (e) => {
      if (e.target === backdrop) close();
    });
    document.addEventListener('keydown', function onEsc(e) {
      if (e.key === 'Escape') {
        close();
        document.removeEventListener('keydown', onEsc);
      }
    });
    document.body.appendChild(backdrop);
    requestAnimationFrame(() => backdrop.classList.add('is-visible'));
  }

  window.payMember = function(id) {
    if (!window._isLoggedIn?.()) {
      showAppNotice('Vui lòng đăng nhập trước khi thanh toán', 'Cần đăng nhập');
      return;
    }
    if (window._openPayModal) {
      window._openPayModal(id);
    } else {
      // fallback: thử lại sau khi script modal load xong
      setTimeout(() => window._openPayModal?.(id), 100);
    }
  };

  function setupMemberSwipeActions() {
    const isMobile = window.matchMedia?.('(max-width: 767px)').matches;

    document.querySelectorAll('.member-swipe-row').forEach(row => {
      const card = row.querySelector('.member-swipe-card');
      const actions = row.querySelector('.member-swipe-actions');
      if (!card || !actions) return;

      // Tablet/desktop hiển thị action trực tiếp, không cần gesture.
      if (!isMobile) return;

      const getMaxSwipe = () => Math.max(128, Math.ceil(actions.getBoundingClientRect().width || 128));
      const clamp = (value, maxSwipe) => Math.max(-maxSwipe, Math.min(0, value));
      const setX = (x) => { card.style.transform = `translate3d(${x}px, 0, 0)`; };
      const resetInlineTransform = () => {
        card.style.transition = '';
        card.style.transform = '';
      };
      const openRow = () => {
        closeMemberSwipeRows(row);
        resetInlineTransform();
        row.classList.add('is-open');
      };
      const closeRow = () => {
        resetInlineTransform();
        row.classList.remove('is-open');
      };

      let startX = 0;
      let startY = 0;
      let baseX = 0;
      let lastX = 0;
      let dragging = false;
      let lockedAxis = null;
      let pointerId = null;

      const beginDrag = (clientX, clientY, id) => {
        const maxSwipe = getMaxSwipe();
        startX = clientX;
        startY = clientY;
        baseX = row.classList.contains('is-open') ? -maxSwipe : 0;
        lastX = baseX;
        dragging = true;
        lockedAxis = null;
        pointerId = id ?? null;
        card.style.transition = 'none';
      };

      const moveDrag = (clientX, clientY, event) => {
        if (!dragging) return;
        const dx = clientX - startX;
        const dy = clientY - startY;

        if (!lockedAxis) {
          if (Math.abs(dx) < 8 && Math.abs(dy) < 8) return;
          lockedAxis = Math.abs(dx) > Math.abs(dy) * 1.15 ? 'x' : 'y';
        }

        if (lockedAxis !== 'x') return;

        const maxSwipe = getMaxSwipe();
        lastX = clamp(baseX + dx, maxSwipe);
        setX(lastX);
        event?.preventDefault?.();
      };

      const endDrag = () => {
        if (!dragging) return;
        const maxSwipe = getMaxSwipe();
        const shouldOpen = lockedAxis === 'x' && lastX <= -maxSwipe * 0.35;
        dragging = false;
        lockedAxis = null;
        pointerId = null;
        shouldOpen ? openRow() : closeRow();
      };

      // Pointer Events: ổn định hơn trên mobile hiện đại.
      if (window.PointerEvent) {
        card.addEventListener('pointerdown', (e) => {
          if (e.pointerType === 'mouse' || e.button !== 0) return;
          beginDrag(e.clientX, e.clientY, e.pointerId);
          try { card.setPointerCapture(e.pointerId); } catch (_) {}
        });

        card.addEventListener('pointermove', (e) => {
          if (pointerId !== null && e.pointerId !== pointerId) return;
          moveDrag(e.clientX, e.clientY, e);
        });

        card.addEventListener('pointerup', endDrag);
        card.addEventListener('pointercancel', endDrag);
        card.addEventListener('lostpointercapture', () => {
          if (dragging) endDrag();
        });
      }

      // Touch fallback cho iOS/Safari cũ và trường hợp PointerEvent không ổn định.
      card.addEventListener('touchstart', (e) => {
        if (e.touches.length !== 1) return;
        beginDrag(e.touches[0].clientX, e.touches[0].clientY, null);
      }, { passive: true });

      card.addEventListener('touchmove', (e) => {
        if (e.touches.length !== 1) return;
        moveDrag(e.touches[0].clientX, e.touches[0].clientY, e);
      }, { passive: false });

      card.addEventListener('touchend', endDrag, { passive: true });
      card.addEventListener('touchcancel', endDrag, { passive: true });
    });
  }

  document.addEventListener('click', (e) => {
    if (!e.target.closest?.('.member-swipe-row')) closeMemberSwipeRows();
  });

  window.setMemberSort = function(key) {
    if (!['soTran', 'noThang', 'noBia', 'total'].includes(key)) return;

    // Cycle per filter: giảm dần → tăng dần → bỏ lọc, quay về tên A-Z.
    if (_sortKey !== key) {
      _sortKey = key;
      _sortDir = 'desc';
    } else if (_sortDir === 'desc') {
      _sortDir = 'asc';
    } else {
      _sortKey = 'name';
      _sortDir = 'asc';
    }

    if (_S) renderPage(_S);
    else updateSortButtons();
  };

  window.setFilter = function(f) {
    _filter = f;
    ['all','active','inactive','left'].forEach(x => {
      document.getElementById('tab-'+x)?.classList.toggle('active', x === f);
    });
    if (_S) renderPage(_S);
  };

  window.editMember = function(id) {
    if (!window._isLoggedIn?.()) {
      showAppNotice('Vui lòng đăng nhập trước khi sửa thông tin', 'Cần đăng nhập');
      return;
    }
    if (!_S) return;
    const m = (_S.members||[]).find(x => x.id == id);
    if (!m) return;
    document.getElementById('member-modal-title').textContent = 'Sửa thành viên';
    document.getElementById('member-name').value   = m.name || '';
    document.getElementById('member-phone').value  = m.phone || '';
    document.getElementById('member-status').value = m.status || 'active';
    document.getElementById('member-note').value   = m.note || '';
    document.getElementById('member-edit-id').value = m.id;
    document.getElementById('add-member-modal').style.display = 'flex';
  };

  function openAddMember() {
    if (!window._isLoggedIn?.()) {
      showAppNotice('Vui lòng đăng nhập để thêm thành viên', 'Cần đăng nhập');
      return;
    }
    document.getElementById('member-modal-title').textContent = 'Thêm thành viên';
    document.getElementById('member-name').value   = '';
    document.getElementById('member-phone').value  = '';
    document.getElementById('member-status').value = 'active';
    document.getElementById('member-note').value   = '';
    document.getElementById('member-edit-id').value = '';
    document.getElementById('add-member-modal').style.display = 'flex';
  }

  window.onComponentsReady = function() {
    document.getElementById('btn-add-member')?.addEventListener('click', openAddMember);
    document.getElementById('member-search')?.addEventListener('input', (e) => {
      _query = e.target.value || '';
      if (_S) renderPage(_S);
    });
    document.getElementById('btn-cancel-member')?.addEventListener('click', () => {
      document.getElementById('add-member-modal').style.display = 'none';
    });
    document.getElementById('add-member-modal')?.addEventListener('click', (e) => {
      if (e.target === document.getElementById('add-member-modal'))
        document.getElementById('add-member-modal').style.display = 'none';
    });
    document.getElementById('btn-save-member')?.addEventListener('click', () => {
      if (!_S || !window._isLoggedIn?.()) return;
      const name   = document.getElementById('member-name').value.trim();
      const phone  = document.getElementById('member-phone').value.trim();
      const status = document.getElementById('member-status').value;
      const note   = document.getElementById('member-note').value.trim();
      const editId = document.getElementById('member-edit-id').value;
      if (!name) { showAppNotice('Vui lòng nhập tên thành viên', 'Thiếu thông tin'); return; }
      if (!_S.members) _S.members = [];
      if (editId) {
        const m = _S.members.find(x => x.id == editId);
        if (m) { m.name = name; m.phone = phone; m.status = status; m.note = note; }
      } else {
        const newId = _S.nextMid || (_S.members.length + 1);
        _S.members.push({ id: newId, name, phone, status, note });
        _S.nextMid = newId + 1;
      }
      window._saveS?.(_S);
      document.getElementById('add-member-modal').style.display = 'none';
      renderPage(_S);
    });
    document.getElementById('page-content').style.opacity = '1';
  };
  window._onDataReady = function(S) { renderPage(S); };
  window._onAuthChange = function() { if(_S) renderPage(_S); };
</script>
<!-- Modal: Thanh toán nợ -->
<div class="modal-backdrop" id="pay-modal" style="display:none" role="dialog" aria-modal="true">
  <div class="modal fade-in" style="max-height:90vh;overflow-y:auto">
    <div class="modal-handle"></div>

    <!-- Header -->
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px">
      <div>
        <div class="section-overline" style="margin-bottom:4px">Thanh toán nợ</div>
        <div style="font-size:20px;font-weight:800" id="pay-member-name">—</div>
      </div>
      <button class="btn btn-icon btn-ghost" onclick="closePayModal()" style="flex-shrink:0;margin-top:-4px">
        <iconify-icon icon="solar:close-circle-linear" style="font-size:22px"></iconify-icon>
      </button>
    </div>

    <!-- Body: sections -->
    <div id="pay-body" style="display:flex;flex-direction:column;gap:0">
      <!-- injected by JS -->
    </div>

    <!-- Tổng -->
    <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 0;margin-top:4px;border-top:0px solid var(--bg-stroke)">
      <span style="font-size:16px;font-weight:800">Tổng thanh toán</span>
      <span style="font-size:22px;font-weight:900;color:var(--color-accent-light)" id="pay-total">0</span>
    </div>

    <!-- Note -->
    <div style="font-size:12px;color:var(--text-muted);text-align:center;padding:0 8px 16px;line-height:1.6" id="pay-note">
      Xác nhận sẽ tự động cập nhật trạng thái đóng quỹ tháng và quỹ bia
    </div>

    <!-- Buttons -->
    <div style="display:flex;gap:12px">
      <button class="btn btn-surface w-full" onclick="closePayModal()" style="justify-content:center">Huỷ</button>
      <button class="btn btn-gold w-full" id="btn-confirm-pay" style="justify-content:center;font-size:15px;font-weight:800">
        <iconify-icon icon="solar:check-circle-linear" style="font-size:18px"></iconify-icon>
        Xác nhận thanh toán
      </button>
    </div>
  </div>
</div>

<script>
  // ── Thanh toán modal ─────────────────────────────────────
  let _payMemberId = null;

  window.closePayModal = function() {
    document.getElementById('pay-modal').style.display = 'none';
    _payMemberId = null;
  };
  document.getElementById('pay-modal')?.addEventListener('click', e => {
    if (e.target === document.getElementById('pay-modal')) closePayModal();
  });

  window._openPayModal = function(id) {
    if (!_S) return;
    const member = (_S.members || []).find(m => m.id == id);
    if (!member) return;
    _payMemberId = id;

    // Tính nợ
    const MONTHS_LABEL = ['T1','T2','T3','T4','T5','T6','T7','T8','T9','T10','T11','T12'];
    const yearKey = _year === BASE_YEAR ? String(member.id) : `${member.id}_${_year}`;
    const arr = (_S.thuThang?.[yearKey] || Array(12).fill(0)).slice(0, 12);
    const debtMonths = arr.map((v, mi) => ({ v, mi })).filter(({ v, mi }) => v === 0 && isMonthCountedForDebt(mi));
    const noThang = debtMonths.length * FEE;

    const matches = (_S.matches || []).filter(m => _year === BASE_YEAR ? (!m.year || m.year === BASE_YEAR) : m.year === _year);
    const unpaidMatches = matches.filter(m => (m.losers || []).some(l => l.memberId == id && !l.paid));
    const noBia = unpaidMatches.length * FINE;

    const total = noThang + noBia;

    // Set tên
    document.getElementById('pay-member-name').textContent = member.name;
    document.getElementById('pay-total').textContent = fmt(total);

    // Build body
    let bodyHTML = '';

    if (noThang > 0) {
      bodyHTML += `
        <div style="padding:16px 0;border-bottom:1px solid var(--bg-border)">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <div style="font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px">
              <iconify-icon icon="solar:wallet-linear" style="font-size:18px;color:var(--color-primary)"></iconify-icon>
              Nợ quỹ tháng
            </div>
            <div style="font-weight:800;color:var(--color-primary)">${fmt(noThang)}</div>
          </div>
          <div style="font-size:12px;color:var(--text-secondary)">
            Còn thiếu ${debtMonths.length} tháng × ${fmt(FEE)}: ${debtMonths.map(({ mi }) => MONTHS_LABEL[mi]).join(', ')}
          </div>
        </div>`;
    }

    if (noBia > 0) {
      const matchLines = unpaidMatches.map(m => {
        const d = m.date ? m.date.split('-').reverse().join('/') : '—';
        return `<div style="font-size:12px;color:var(--text-secondary)">· Trận ${d}: 1 lần × ${fmt(FINE)}</div>`;
      }).join('');
      bodyHTML += `
        <div style="padding:16px 0;border-bottom:1px solid var(--bg-border)">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <div style="font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px">
              <iconify-icon icon="solar:cup-star-linear" style="font-size:18px;color:var(--color-primary)"></iconify-icon>
              Nợ quỹ bia
            </div>
            <div style="font-weight:800;color:var(--color-primary)">${fmt(noBia)}</div>
          </div>
          ${matchLines}
        </div>`;
    }

    if (total === 0) {
      bodyHTML = `<div class="empty-state" style="padding:24px 0">
        <div class="empty-state__icon"><iconify-icon icon="solar:check-circle-linear" style="font-size:40px;color:var(--color-success)"></iconify-icon></div>
        <div class="empty-state__title">Không có khoản nợ nào</div>
      </div>`;
      document.getElementById('pay-note').style.display = 'none';
      document.getElementById('btn-confirm-pay').disabled = true;
    } else {
      document.getElementById('pay-note').style.display = 'block';
      document.getElementById('btn-confirm-pay').disabled = false;
    }

    document.getElementById('pay-body').innerHTML = bodyHTML;
    document.getElementById('pay-modal').style.display = 'flex';
  };

  document.getElementById('btn-confirm-pay')?.addEventListener('click', async () => {
    if (!_S || !_payMemberId) return;
    const id = _payMemberId;
    const btn = document.getElementById('btn-confirm-pay');
    btn.disabled = true;
    btn.innerHTML = '<iconify-icon icon="solar:spinner-linear" style="font-size:18px"></iconify-icon>Đang lưu…';

    // 1. Update quỹ tháng: đánh dấu các tháng nợ → 1 (đã đóng)
    const yearKey = _year === BASE_YEAR ? String(id) : `${id}_${_year}`;
    const arr = (_S.thuThang?.[yearKey] || Array(12).fill(0)).slice(0, 12);
    let changed = false;
    arr.forEach((v, mi) => {
      if (v === 0 && isMonthCountedForDebt(mi)) { arr[mi] = 1; changed = true; }
    });
    if (changed) {
      if (!_S.thuThang) _S.thuThang = {};
      _S.thuThang[yearKey] = arr;
    }

    // 2. Update quỹ bia: đánh dấu paid = true
    (_S.matches || []).forEach(m => {
      const yr = _year === BASE_YEAR ? (!m.year || m.year === BASE_YEAR) : m.year === _year;
      if (!yr) return;
      (m.losers || []).forEach(l => {
        if (l.memberId == id && !l.paid) l.paid = true;
      });
    });

    await window._saveS?.(_S);
    renderPage(_S);
    closePayModal();

    btn.disabled = false;
    btn.innerHTML = '<iconify-icon icon="solar:check-circle-linear" style="font-size:18px"></iconify-icon>Xác nhận thanh toán';
  });
</script>
</body>
</html>
