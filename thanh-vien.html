<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0C0C0F">
  <title>FC Sunday — Thành viên</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js" defer></script>
</head>
<body data-active="thanh-vien">
<div class="app-shell">
  <div data-component="sidebar"></div>
  <div class="main-content">
    <div data-component="header" data-title="Thành viên"></div>
    <main class="page" id="page-content" style="opacity:0;transition:opacity .2s">

      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;gap:12px;flex-wrap:wrap">
        <div>
          <div class="section-overline">Đội hình</div>
          <h1 class="text-h1">Thành viên</h1>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="year-selector"><iconify-icon icon="solar:calendar-linear" style="font-size:14px"></iconify-icon><span id="year-text">2026</span></div>
          <button class="btn btn-primary auth-only" id="btn-add-member" style="display:none">
            <iconify-icon icon="solar:add-circle-linear" style="font-size:18px"></iconify-icon>
            Thêm thành viên
          </button>
        </div>
      </div>

      <!-- KPI -->
      <div class="grid-2 member-kpi-grid" style="margin-bottom:24px">
        <div class="kpi-card">
          <div class="kpi-card__label">Thành viên hoạt động</div>
          <div class="kpi-card__value" id="kpi-active">0</div>
        </div>
        <div class="kpi-card kpi-card--red">
          <div class="kpi-card__label">Chưa đóng tháng</div>
          <div class="kpi-card__value" id="kpi-chua-dong">0</div>
        </div>
        <div class="kpi-card kpi-card--red">
          <div class="kpi-card__label">Tổng nợ tháng</div>
          <div class="kpi-card__value" id="kpi-no-thang">0</div>
        </div>
        <div class="kpi-card kpi-card--red">
          <div class="kpi-card__label">Tổng nợ bia</div>
          <div class="kpi-card__value" id="kpi-no-bia">0</div>
        </div>
      </div>

      <!-- Filter tabs -->
      <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
        <button class="month-tab active" id="tab-all"      onclick="setFilter('all')">Tất cả</button>
        <button class="month-tab"        id="tab-active"   onclick="setFilter('active')">Đang hoạt động</button>
        <button class="month-tab"        id="tab-inactive" onclick="setFilter('inactive')">Tạm nghỉ</button>
        <button class="month-tab"        id="tab-left"     onclick="setFilter('left')">Đã nghỉ</button>
      </div>
      <style>
        .month-tab { padding:7px 14px; border-radius:var(--radius-full); font-size:13px; font-weight:600; background:var(--bg-elevated); color:var(--text-secondary); border:1px solid var(--bg-border); cursor:pointer; transition:background .12s,color .12s,border-color .12s; }
        .month-tab.active { background:rgba(255,192,46,.15); color:var(--color-primary); border-color:rgba(255,192,46,.3); }
      </style>

      <!-- Member list -->
      <div id="member-list" style="display:flex;flex-direction:column;gap:8px"></div>

    </main>
  </div>
  <div data-component="bottom-nav"></div>
</div>

<!-- Add member modal -->
<div class="modal-backdrop" id="add-member-modal" style="display:none">
  <div class="modal fade-in">
    <div class="modal-handle"></div>
    <h2 class="modal-title" id="member-modal-title">Thêm thành viên</h2>
    <div style="display:flex;flex-direction:column;gap:12px">
      <div class="field">
        <label>Họ tên</label>
        <input type="text" class="input" id="member-name" placeholder="Nguyễn Văn A">
      </div>
      <div class="field">
        <label>Số điện thoại</label>
        <input type="tel" class="input" id="member-phone" placeholder="0901234567">
      </div>
      <div class="field">
        <label>Trạng thái</label>
        <select class="input" id="member-status">
          <option value="active">Đang hoạt động</option>
          <option value="inactive">Tạm nghỉ</option>
          <option value="left">Đã nghỉ</option>
        </select>
      </div>
      <div class="field">
        <label>Ghi chú</label>
        <input type="text" class="input" id="member-note" placeholder="">
      </div>
      <input type="hidden" id="member-edit-id">
      <div style="display:flex;gap:12px;margin-top:4px">
        <button class="btn btn-primary w-full" id="btn-save-member" style="justify-content:center">
          <iconify-icon icon="solar:check-circle-linear" style="font-size:18px"></iconify-icon>
          Lưu
        </button>
        <button class="btn btn-ghost" id="btn-cancel-member">Huỷ</button>
      </div>
    </div>
  </div>
</div>

<div data-component="login-modal"></div>
<script src="app.js" defer></script>
<script src="components/components-loader.js" defer></script>
<script>
  const FEE = 200000, FINE = 50000, BASE_YEAR = 2026;
  let _year = BASE_YEAR, _S = null, _filter = 'all';

  function fmt(n) { return new Intl.NumberFormat('vi-VN').format(Math.round(n||0)); }
  function fmtK(n) { return new Intl.NumberFormat('vi-VN').format(Math.round((n||0) / 1000)) + 'K'; }
  function moneyChip(n) {
    const value = Math.round(n || 0);
    return `<span class="money-full">${fmt(value)}</span><span class="money-k">${fmtK(value)}</span>`;
  }

  const STATUS_LABEL = { active:'Đang hoạt động', inactive:'Tạm nghỉ', left:'Đã nghỉ' };
  const STATUS_BADGE = {
    active:   '<span class="badge badge-success">Đang hoạt động</span>',
    inactive: '<span class="badge badge-warning">Tạm nghỉ</span>',
    left:     '<span class="badge badge-muted">Đã nghỉ</span>',
  };

  function isMonthCountedForDebt(monthIdx) {
    const now = new Date();
    const currentYear = now.getFullYear();
    const currentMonthIdx = now.getMonth();
    if (_year < currentYear) return true;
    if (_year > currentYear) return false;
    return monthIdx <= currentMonthIdx;
  }

  function calcDebt(S, member) {
    const yearKey = _year === BASE_YEAR ? String(member.id) : `${member.id}_${_year}`;
    const arr = (S.thuThang?.[yearKey] || Array(12).fill(0)).slice(0, 12);
    while (arr.length < 12) arr.push(0);

    // Chỉ tính nợ các tháng đã đến hạn.
    // Các tháng tương lai vẫn có thể đánh dấu đóng trước ở trang Thu tháng,
    // nhưng trạng thái chưa đóng của tháng tương lai không được cộng vào nợ.
    const noThang = arr.reduce((sum, v, monthIdx) => {
      return sum + (v === 0 && isMonthCountedForDebt(monthIdx) ? FEE : 0);
    }, 0);

    const matches = (S.matches||[]).filter(m => {
      const yr = _year === BASE_YEAR ? (!m.year || m.year === BASE_YEAR) : m.year === _year;
      return yr;
    });
    const noBia = matches.reduce((s, m) => {
      const l = (m.losers||[]).find(l => l.memberId == member.id);
      return s + (l && !l.paid ? FINE : 0);
    }, 0);

    const soTran = matches.filter(m => (m.losers||[]).some(l=>l.memberId==member.id)).length;

    return { noThang, noBia, total: noThang + noBia, soTran };
  }

  function renderPage(S) {
    _S = S;
    const isAdmin = window._isLoggedIn?.();
    const addBtn = document.getElementById('btn-add-member');
    if (addBtn) addBtn.style.display = isAdmin ? 'inline-flex' : 'none';

    document.getElementById('year-text').textContent = _year;

    const all = S.members || [];
    const active = all.filter(m => m.status !== 'left');

    // KPI
    let noThangTotal = 0, noBiaTotal = 0, chuaDongCount = 0;
    active.forEach(m => {
      const d = calcDebt(S, m);
      noThangTotal += d.noThang;
      noBiaTotal   += d.noBia;
      if (d.noThang > 0) chuaDongCount += 1;
    });
    document.getElementById('kpi-active').textContent    = all.filter(m=>m.status==='active').length;
    document.getElementById('kpi-chua-dong').textContent = chuaDongCount;
    document.getElementById('kpi-no-thang').textContent  = fmt(noThangTotal);
    document.getElementById('kpi-no-bia').textContent    = fmt(noBiaTotal);

    // Filter
    const show = _filter === 'all' ? all : all.filter(m => m.status === _filter);

    const el = document.getElementById('member-list');
    if (!show.length) {
      el.innerHTML = `<div class="empty-state">
        <div class="empty-state__icon"><iconify-icon icon="solar:users-group-rounded-linear" style="font-size:48px"></iconify-icon></div>
        <div class="empty-state__title">Chưa có thành viên</div>
      </div>`;
      return;
    }

    el.innerHTML = show.map(m => {
      const d = calcDebt(S, m);
      const monthDebtClass = d.noThang > 0 ? 'is-debt' : 'is-clear';
      const beerDebtClass = d.noBia > 0 ? 'is-debt' : 'is-clear';
      const totalDebtClass = d.total > 0 ? 'is-debt' : 'is-clear';

      return `<div class="member-row member-detail-card fade-in">
        <div class="member-detail-card__top">
          <div class="member-row__name">${m.name}</div>
          <div class="member-detail-card__status">
            ${STATUS_BADGE[m.status] || ''}
            ${isAdmin ? `<button class="btn btn-icon btn-ghost member-detail-card__edit" onclick="editMember(${m.id})" title="Sửa thông tin">
              <iconify-icon icon="solar:pen-2-linear" style="font-size:16px"></iconify-icon>
            </button>` : ''}
          </div>
        </div>
        <div class="member-detail-card__meta-row">
          <span class="member-debt-pill member-debt-pill--match">${d.soTran} thua</span>
          <span class="member-debt-pill member-debt-pill--month ${monthDebtClass}">Tháng: ${moneyChip(d.noThang)}</span>
          <span class="member-debt-pill member-debt-pill--beer ${beerDebtClass}">Bia: ${moneyChip(d.noBia)}</span>
          <span class="member-debt-pill member-debt-pill--total ${totalDebtClass}">Σ: ${moneyChip(d.total)}</span>
        </div>
      </div>`;
    }).join('');
  }

  window.setFilter = function(f) {
    _filter = f;
    ['all','active','inactive','left'].forEach(x => {
      document.getElementById('tab-'+x)?.classList.toggle('active', x === f);
    });
    if (_S) renderPage(_S);
  };

  window.editMember = function(id) {
    if (!_S) return;
    const m = (_S.members||[]).find(x => x.id == id);
    if (!m) return;
    document.getElementById('member-modal-title').textContent = 'Sửa thành viên';
    document.getElementById('member-name').value   = m.name || '';
    document.getElementById('member-phone').value  = m.phone || '';
    document.getElementById('member-status').value = m.status || 'active';
    document.getElementById('member-note').value   = m.note || '';
    document.getElementById('member-edit-id').value = m.id;
    document.getElementById('add-member-modal').style.display = 'flex';
  };

  function openAddMember() {
    document.getElementById('member-modal-title').textContent = 'Thêm thành viên';
    document.getElementById('member-name').value   = '';
    document.getElementById('member-phone').value  = '';
    document.getElementById('member-status').value = 'active';
    document.getElementById('member-note').value   = '';
    document.getElementById('member-edit-id').value = '';
    document.getElementById('add-member-modal').style.display = 'flex';
  }

  window.onComponentsReady = function() {
    document.getElementById('btn-add-member')?.addEventListener('click', openAddMember);
    document.getElementById('btn-cancel-member')?.addEventListener('click', () => {
      document.getElementById('add-member-modal').style.display = 'none';
    });
    document.getElementById('add-member-modal')?.addEventListener('click', (e) => {
      if (e.target === document.getElementById('add-member-modal'))
        document.getElementById('add-member-modal').style.display = 'none';
    });
    document.getElementById('btn-save-member')?.addEventListener('click', () => {
      if (!_S || !window._isLoggedIn?.()) return;
      const name   = document.getElementById('member-name').value.trim();
      const phone  = document.getElementById('member-phone').value.trim();
      const status = document.getElementById('member-status').value;
      const note   = document.getElementById('member-note').value.trim();
      const editId = document.getElementById('member-edit-id').value;
      if (!name) { alert('Vui lòng nhập tên'); return; }
      if (!_S.members) _S.members = [];
      if (editId) {
        const m = _S.members.find(x => x.id == editId);
        if (m) { m.name = name; m.phone = phone; m.status = status; m.note = note; }
      } else {
        const newId = _S.nextMid || (_S.members.length + 1);
        _S.members.push({ id: newId, name, phone, status, note });
        _S.nextMid = newId + 1;
      }
      window._saveS?.(_S);
      document.getElementById('add-member-modal').style.display = 'none';
      renderPage(_S);
    });
    document.getElementById('page-content').style.opacity = '1';
  };
  window._onDataReady = function(S) { renderPage(S); };
  window._onAuthChange = function() { if(_S) renderPage(_S); };
</script>
</body>
</html>
