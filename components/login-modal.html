<!-- ========================
  FC Sunday V2 — Login Modal Component
  Usage: <div data-component="login-modal"></div>
======================== -->
<div class="modal-backdrop" id="login-modal" style="display:none" role="dialog" aria-modal="true" aria-labelledby="login-title">
  <div class="modal fade-in">
    <div class="modal-handle" style="display:block"></div>
    <h2 class="modal-title" id="login-title">Đăng nhập</h2>

    <div style="display:flex;flex-direction:column;gap:16px">
      <div class="field">
        <label for="login-email">Email</label>
        <input class="input" type="email" id="login-email" placeholder="email@example.com" autocomplete="username" />
      </div>
      <div class="field">
        <label for="login-password">Mật khẩu</label>
        <input class="input" type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <!-- Error -->
      <div id="login-error" style="display:none;background:rgba(224,57,44,.12);border:1px solid rgba(224,57,44,.3);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--color-accent-light)">
        <iconify-icon icon="solar:close-circle-linear" style="vertical-align:middle;margin-right:4px"></iconify-icon>
        <span id="login-error-msg">Email hoặc mật khẩu không đúng.</span>
      </div>

      <div style="display:flex;gap:12px;margin-top:4px">
        <button class="btn btn-primary w-full" id="btn-login-submit" style="justify-content:center">
          <iconify-icon icon="solar:lock-unlocked-linear" style="font-size:18px"></iconify-icon>
          Đăng nhập
        </button>
        <button class="btn btn-ghost" id="btn-login-cancel" style="flex-shrink:0">Huỷ</button>
      </div>
    </div>
  </div>
</div>
