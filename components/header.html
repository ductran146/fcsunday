<!-- ========================
  FC Sunday V2 — Header Component
======================== -->
<div class="topbar">
  <!-- Logo: chỉ hiện mobile/PWA -->
  <img src="icon-192.png" alt="FC Sunday" class="topbar-logo">

  <!-- Title: bold -->
  <span class="topbar-title" id="topbar-title">FC Sunday</span>

  <!-- Spacer đẩy actions sang phải -->
  <div style="flex:1"></div>

  <!-- Actions -->
  <div class="topbar-actions">
    <!-- Quick view -->
    <a href="share.html" target="_blank" class="btn btn-icon btn-ghost" title="Xem tổng quỹ nhanh">
      <iconify-icon icon="solar:eye-linear" style="font-size:22px"></iconify-icon>
    </a>

    <!-- PWA Install (chỉ hiện mobile web, ẩn khi đã cài) -->
    <button class="btn btn-icon btn-ghost" id="btn-pwa-install" title="Cài đặt ứng dụng" style="display:none">
      <iconify-icon icon="solar:download-minimalistic-linear" style="font-size:22px"></iconify-icon>
    </button>

    <!-- Chưa login -->
    <button class="btn btn-outline btn-sm" id="btn-login" style="display:inline-flex;gap:6px;align-items:center">
      <iconify-icon icon="solar:login-2-linear" style="font-size:16px"></iconify-icon>
      Đăng nhập
    </button>

    <!-- Đã login: Setting -->
    <a href="settings.html" class="btn btn-icon btn-ghost auth-only" id="btn-setting" title="Cài đặt" style="display:none">
      <iconify-icon icon="solar:settings-linear" style="font-size:22px"></iconify-icon>
    </a>

    <!-- Đã login: Avatar -->
    <button class="topbar-avatar auth-only" id="btn-avatar" title="Đăng xuất" style="display:none">Đ</button>
  </div>
</div>
