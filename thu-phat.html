<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="theme-color" content="#0C0C0F">
  <title>FC Sunday — Quỹ bia</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>
  <style>
    .month-tab {
      padding: 8px 16px; border-radius: var(--radius-full);
      font-size: 13px; font-weight: 600;
      background: var(--bg-elevated); color: var(--text-secondary);
      border: 1px solid var(--bg-border); cursor: pointer;
      transition: background .12s, color .12s, border-color .12s;
    }
    .month-tab.active { background: rgba(255,192,46,.15); color: var(--color-primary); border-color: rgba(255,192,46,.3); }
    .loser-chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 10px; border-radius: var(--radius-full);
      font-size: 12px; font-weight: 600;
      cursor: pointer; transition: background .12s;
    }
    .loser-paid   { background: rgba(46,204,113,.15); color: var(--color-success); border: 1px solid rgba(46,204,113,.3); }
    .loser-unpaid { background: rgba(224,57,44,.1);  color: var(--color-accent-light); border: 1px solid rgba(224,57,44,.2); }

    /* Loser toggle 3 states */
    .loser-toggle {
      padding: 6px 14px; border-radius: var(--radius-full);
      font-size: 13px; font-weight: 600; cursor: pointer;
      border: 1.5px solid var(--bg-stroke);
      background: var(--bg-elevated); color: var(--text-muted);
      transition: background .12s, color .12s, border-color .12s;
      font-family: var(--font-sans);
    }
    /* state=1: thua chưa đóng — đỏ */
    .loser-toggle[data-state="1"] {
      background: rgba(224,57,44,.12); color: var(--color-accent-light);
      border-color: rgba(224,57,44,.4);
    }
    /* state=2: thua đã đóng — xanh */
    .loser-toggle[data-state="2"] {
      background: rgba(46,204,113,.12); color: var(--color-success);
      border-color: rgba(46,204,113,.4);
    }
    .month-accordion-card { border-radius: var(--radius-xl); overflow: hidden; border: 1px solid var(--bg-border); background: var(--bg-surface); }
    .month-accordion-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; cursor: pointer;
      background: var(--bg-elevated);
      user-select: none;
      transition: background .12s;
    }
    .month-accordion-header:hover { background: var(--bg-stroke); }
    .month-accordion-title { font-size: 16px; font-weight: 700; }
    .month-accordion-chevron {
      font-size: 20px; color: var(--text-muted);
      transition: transform .2s;
      flex-shrink: 0;
    }
    .month-accordion-card.is-open .month-accordion-chevron { transform: rotate(180deg); }
    .month-accordion-body { display: none; padding: 16px 20px; display:flex; flex-direction:column; gap:16px; }
    .month-accordion-card:not(.is-open) .month-accordion-body { display: none; }

    /* Month summary chips */
    .month-summary-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 4px; }
    .month-chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 5px 12px; border-radius: var(--radius-full);
      font-size: 12px; font-weight: 700;
      background: var(--bg-elevated); color: var(--text-secondary);
      border: 1px solid var(--bg-border);
    }
    .month-chip--total { background: rgba(224,57,44,.1); color: var(--color-accent-light); border-color: rgba(224,57,44,.2); }
    .month-chip--extra { background: var(--bg-elevated); color: var(--text-primary); }
    .month-chip--debt  { background: rgba(255,192,46,.1); color: var(--color-primary); border-color: rgba(255,192,46,.25); }

    /* Match item */
    .match-item { background: var(--bg-elevated); border-radius: var(--radius-lg); padding: 14px 16px; border: 1px solid var(--bg-border); }
    .match-item__header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .match-item__num {
      width: 32px; height: 32px; border-radius: var(--radius-sm);
      background: var(--bg-stroke); color: var(--text-secondary);
      font-size: 12px; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .match-item__date { font-size: 15px; font-weight: 700; }
    .match-item__losers { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
    .match-item__extra {
      font-size: 12px; color: var(--text-secondary);
      padding: 6px 10px; border-radius: var(--radius-sm);
      background: rgba(255,192,46,.06); border: 1px solid rgba(255,192,46,.15);
      margin-bottom: 6px;
    }
    .match-item__summary { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    .match-item__summary strong { color: var(--text-primary); font-weight: 700; }
    .match-item__actions { display: flex; justify-content: flex-end; margin-top: 8px; }

  </style>
</head>
<body data-active="thu-phat">
<div class="app-shell">
  <div data-component="sidebar"></div>
  <div class="main-content">
    <div class="topbar">
      <img src="icon-192.png" alt="FC Sunday" class="topbar-logo" style="width:32px;height:32px;object-fit:contain;flex-shrink:0;border-radius:6px">
      <span class="topbar-title" id="topbar-title">FC Sunday</span>
      <div style="flex:1"></div>
      <div class="topbar-actions">
        <a href="share.html" target="_blank" class="btn btn-icon btn-ghost" title="Xem tổng quỹ nhanh">
          <iconify-icon icon="solar:eye-linear" style="font-size:22px"></iconify-icon>
        </a>
        <button class="btn btn-outline btn-sm" id="btn-login" style="display:inline-flex;gap:6px;align-items:center">
          <iconify-icon icon="solar:login-2-linear" style="font-size:16px"></iconify-icon>
          Đăng nhập
        </button>
        <button class="btn btn-icon btn-ghost auth-only" id="btn-setting" title="Cài đặt" style="display:none">
          <iconify-icon icon="solar:settings-linear" style="font-size:22px"></iconify-icon>
        </button>
        <button class="topbar-avatar auth-only" id="btn-avatar" title="Đăng xuất" style="display:none">Đ</button>
      </div>
    </div>
    <main class="page" id="page-content" style="opacity:0;transition:opacity .2s">

      <div class="thu-thang-page-header">
        <div class="thu-thang-page-title">
          <div class="section-overline">50.000 / người / trận thua</div>
          <h1 class="text-h1">Quỹ bia 🍺</h1>
        </div>
        <select class="year-selector thu-thang-year-selector" id="year-select">
          <!-- options injected by JS -->
        </select>
      </div>

      <!-- KPI 2x2 -->
      <div class="grid-2-fixed" style="margin-bottom:24px">
        <div class="kpi-card kpi-card--gold">
          <div class="kpi-card__label">Tổng thu bia</div>
          <div class="kpi-card__value" id="kpi-thu-bia">0</div>
        </div>
        <div class="kpi-card kpi-card--red">
          <div class="kpi-card__label">Còn nợ</div>
          <div class="kpi-card__value" id="kpi-con-no">0</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-card__label">Số trận</div>
          <div class="kpi-card__value" id="kpi-so-tran">0</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-card__label">Người còn nợ</div>
          <div class="kpi-card__value" id="kpi-nguoi-no">0</div>
        </div>
      </div>

      <!-- Leaderboard full width -->
      <div class="card" style="margin-bottom:24px">
        <div class="section-overline" style="margin-bottom:4px">Xếp hạng</div>
        <div class="section-title" style="font-size:16px;margin-bottom:4px">Top thua nhiều nhất</div>
        <div id="bia-leaderboard">
          <div style="color:var(--text-muted);font-size:13px;text-align:center;padding:24px">Chưa có dữ liệu</div>
        </div>
      </div>

      <!-- Monthly accordion -->
      <div id="month-accordion" style="display:flex;flex-direction:column;gap:12px"></div>

      <!-- Save bar (pending changes) -->
      <div class="thu-thang-save-bar" id="bia-save-bar" hidden>
        <button class="btn btn-surface thu-thang-action-btn" type="button" onclick="cancelBiaChanges()">Huỷ</button>
        <button class="btn btn-gold thu-thang-action-btn" id="bia-save-btn" type="button" onclick="saveBiaChanges()">Lưu</button>
      </div>
    </main>
  </div>
  <div data-component="bottom-nav"></div>
</div>

<!-- Match modal (thêm / sửa trận) -->
<div class="sheet-backdrop" id="match-modal" style="display:none" role="dialog" aria-modal="true">
  <div class="sheet fade-in">
    <div class="modal-handle"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <h2 class="modal-title" id="match-modal-title" style="margin-bottom:0">Thêm trận đấu</h2>
      <button class="btn btn-icon btn-ghost" onclick="closeMatchModal()" style="flex-shrink:0;margin-top:-4px">
        <iconify-icon icon="solar:close-circle-linear" style="font-size:22px"></iconify-icon>
      </button>
    </div>
    <div style="display:flex;flex-direction:column;gap:14px">
      <div class="field">
        <label>Ngày thi đấu</label>
        <button type="button" class="input" id="match-date-btn"
          style="text-align:left;cursor:pointer;display:flex;align-items:center;gap:8px"
          onclick="window.DatePicker?.open('match-date','match-date-display')">
          <iconify-icon icon="solar:calendar-linear" style="font-size:18px;color:var(--text-muted);flex-shrink:0"></iconify-icon>
          <span id="match-date-display" style="color:var(--text-primary)">Chọn ngày</span>
        </button>
        <input type="hidden" id="match-date">
      </div>
      <div class="field">
        <label>Đội thua (chọn nhiều)</label>
        <div id="loser-checkboxes" style="display:flex;flex-wrap:wrap;gap:8px;padding:4px 0"></div>
      </div>
      <div class="field">
        <label>Thu thêm (nếu có)</label>
        <input type="number" class="input" id="match-thu-them" placeholder="0" min="0">
      </div>
      <div class="field">
        <label>Ghi chú thu thêm</label>
        <input type="text" class="input" id="match-ghi-chu" placeholder="VD: Thu bù trận cũ">
      </div>
      <div style="display:flex;gap:12px;margin-top:4px">
        <button class="btn btn-surface" onclick="closeMatchModal()" style="justify-content:center">Huỷ</button>
        <button class="btn btn-primary w-full" id="btn-save-match" style="justify-content:center">
          <iconify-icon icon="solar:check-circle-linear" style="font-size:18px"></iconify-icon>
          Lưu trận
        </button>
      </div>
    </div>
  </div>
</div>

<script>
/* ── Inline DatePicker ── */
window.DatePicker=(function(){'use strict';const MV=['Tháng 1','Tháng 2','Tháng 3','Tháng 4','Tháng 5','Tháng 6','Tháng 7','Tháng 8','Tháng 9','Tháng 10','Tháng 11','Tháng 12'];const DOW=['CN','T2','T3','T4','T5','T6','T7'];let _y,_m,_sel,_hid,_dis;function fmtVN(d){if(!d)return'Chọn ngày';const[y,m,dd]=d.split('-');return`${parseInt(dd)} ${MV[parseInt(m)-1]}, ${y}`;}function setVal(d){const h=document.getElementById(_hid),s=document.getElementById(_dis);if(h)h.value=d;if(s){s.textContent=fmtVN(d);s.style.color=d?'var(--text-primary)':'var(--text-muted)';}}function render(){const lb=document.getElementById('_dp_label');if(lb)lb.textContent=`${MV[_m]}, ${_y}`;const g=document.getElementById('_dp_days');if(!g)return;const fd=new Date(_y,_m,1).getDay(),dim=new Date(_y,_m+1,0).getDate(),ts=new Date().toISOString().slice(0,10);let h='';for(let i=0;i<fd;i++)h+='<div></div>';for(let d=1;d<=dim;d++){const ds=`${_y}-${String(_m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;const isSel=ds===_sel,isTod=ds===ts;let bg='transparent',col='var(--text-primary)',fw='500';if(isSel){bg='var(--color-primary)';col='#1a1206';fw='800';}else if(isTod){bg='rgba(255,192,46,.15)';col='var(--color-primary)';fw='700';}h+=`<button type="button" style="padding:9px 0;text-align:center;font-size:13px;font-weight:${fw};border:none;cursor:pointer;border-radius:var(--radius-md);background:${bg};color:${col};font-family:var(--font-sans)" onclick="DatePicker._pick('${ds}')">${d}</button>`;}g.innerHTML=h;}function ensure(){if(document.getElementById('_dp_modal'))return;const el=document.createElement('div');el.className='modal-backdrop';el.id='_dp_modal';el.style.display='none';el.innerHTML=`<div class="modal fade-in" style="max-width:340px;padding:20px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px"><button class="btn btn-icon btn-ghost" onclick="DatePicker._prev()"><iconify-icon icon="solar:arrow-left-linear" style="font-size:18px"></iconify-icon></button><div style="font-size:15px;font-weight:700" id="_dp_label"></div><button class="btn btn-icon btn-ghost" onclick="DatePicker._next()"><iconify-icon icon="solar:arrow-right-linear" style="font-size:18px"></iconify-icon></button></div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px">${DOW.map(d=>`<div style="text-align:center;font-size:11px;font-weight:700;color:var(--text-muted);padding:4px">${d}</div>`).join('')}</div><div id="_dp_days" style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px"></div><div style="display:flex;justify-content:space-between;margin-top:14px"><button class="btn btn-ghost btn-sm" onclick="DatePicker._today()">Hôm nay</button><button class="btn btn-ghost btn-sm" onclick="DatePicker.close()">Đóng</button></div></div>`;el.addEventListener('click',e=>{if(e.target===el)DatePicker.close();});document.body.appendChild(el);}return{init(b,h,d,def){ensure();_hid=h;_dis=d;setVal(def||new Date().toISOString().slice(0,10));},open(h,d){ensure();_hid=h;_dis=d;const c=document.getElementById(h)?.value;const r=c?new Date(c+'T00:00:00'):new Date();_y=r.getFullYear();_m=r.getMonth();_sel=c||'';render();document.getElementById('_dp_modal').style.display='flex';},close(){const m=document.getElementById('_dp_modal');if(m)m.style.display='none';},_pick(d){_sel=d;setVal(d);this.close();},_prev(){_m--;if(_m<0){_m=11;_y--;}render();},_next(){_m++;if(_m>11){_m=0;_y++;}render();},_today(){const t=new Date();_y=t.getFullYear();_m=t.getMonth();_sel=t.toISOString().slice(0,10);render();},getValue(h){return document.getElementById(h)?.value||'';},setValue(h,d,v){_hid=h;_dis=d;setVal(v);}};})();
</script>
<script src="app.js" defer></script>
<script src="components/components-loader.js" defer></script>
<script>
  const MONTHS = ['T1','T2','T3','T4','T5','T6','T7','T8','T9','T10','T11','T12'];
  const MONTHS_FULL = ['Tháng 1','Tháng 2','Tháng 3','Tháng 4','Tháng 5','Tháng 6',
                       'Tháng 7','Tháng 8','Tháng 9','Tháng 10','Tháng 11','Tháng 12'];
  const FINE = 50000, BASE_YEAR = 2026;
  let _year = BASE_YEAR, _S = null;
  const _openMonths = new Set([new Date().getMonth()]);
  let _editMatchId = null;

  function fmt(n) { return new Intl.NumberFormat('vi-VN').format(n); }
  function fmtDate(d) { if(!d) return '—'; const p=d.split('-'); return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:d; }
  function getYearMatches(S) {
    return (S.matches||[]).filter(m=>_year===BASE_YEAR?(!m.year||m.year===BASE_YEAR):m.year===_year);
  }

  // ── 3-state loser toggle ──────────────────────────────────
  function applyLoserState(btn) {
    // state 0: mặc định, 1: thua chưa đóng (đỏ), 2: thua đã đóng (xanh)
    btn.setAttribute('data-state', btn.dataset.state);
  }
  window.cycleLoserState = function(btn) {
    const cur = parseInt(btn.dataset.state||'0');
    btn.dataset.state = String((cur+1)%3);
    applyLoserState(btn);
  };

  // ── Match modal ──────────────────────────────────────────
  window.closeMatchModal = function() {
    document.getElementById('match-modal').style.display='none'; _editMatchId=null;
  };
  document.getElementById('match-modal')?.addEventListener('click', e=>{
    if(e.target===document.getElementById('match-modal')) closeMatchModal();
  });

  function openMatchModal(targetMi, editId) {
    if(!window._isLoggedIn?.()) return;
    _editMatchId = editId ?? null;
    const isEdit = _editMatchId !== null;
    document.getElementById('match-modal-title').textContent = isEdit ? 'Sửa trận đấu' : `Thêm trận — ${MONTHS_FULL[targetMi]}`;
    const members = (_S?.members||[]).filter(m=>m.status!=='left');
    const cbEl = document.getElementById('loser-checkboxes');
    cbEl.innerHTML = members.map(m=>`
      <button type="button" class="loser-toggle" data-mid="${m.id}" data-state="0" onclick="cycleLoserState(this)">${m.name}</button>`).join('');
    if(isEdit) {
      const match=(_S?.matches||[]).find(m=>m.id==_editMatchId);
      if(match) {
        document.getElementById('match-date').value=match.date||'';
        window.DatePicker?.setValue('match-date','match-date-display', match.date||'');
        document.getElementById('match-thu-them').value=match.thuThem||'';
        document.getElementById('match-ghi-chu').value=match.ghiChuThem||'';
        (match.losers||[]).forEach(l=>{
          const btn=cbEl.querySelector(`[data-mid="${l.memberId}"]`);
          if(btn){btn.dataset.state=l.paid?'2':'1';applyLoserState(btn);}
        });
      }
    } else {
      const today=new Date(),y=_year,mo=targetMi;
      const def=new Date(y,mo,mo===today.getMonth()&&y===today.getFullYear()?today.getDate():1);
      const defStr = def.toISOString().slice(0,10);
      window.DatePicker?.setValue('match-date','match-date-display', defStr);
      document.getElementById('match-thu-them').value='';
      document.getElementById('match-ghi-chu').value='';
    }
    document.getElementById('match-modal').style.display='flex';
  }
  window.openAddMatch  = function(mi)      { openMatchModal(mi, null); };
  window.openEditMatch = function(matchId) {
    const m=(_S?.matches||[]).find(m=>m.id==matchId); if(m) openMatchModal(m.monthIdx, matchId);
  };

  // ── Pending state ────────────────────────────────────────
  let _lastSavedS = null;
  let _hasBiaChanges = false;

  function setBiaPending(has) {
    _hasBiaChanges = !!has;
    const bar = document.getElementById('bia-save-bar');
    if (bar) bar.hidden = !_hasBiaChanges;
  }

  window.togglePaid = function(matchId, memberId) {
    if (!window._isLoggedIn?.() || !_S) return;
    const match = (_S.matches||[]).find(m=>m.id==matchId);
    if (!match) return;
    const loser = (match.losers||[]).find(l=>l.memberId==memberId);
    if (loser) loser.paid = !loser.paid;
    setBiaPending(true);
    renderPage(_S);
  };

  window.cancelBiaChanges = function() {
    if (!_lastSavedS) return;
    _S = JSON.parse(JSON.stringify(_lastSavedS));
    setBiaPending(false);
    renderPage(_S);
  };

  window.saveBiaChanges = async function() {
    if (!_hasBiaChanges || !_S) return;
    const btn = document.getElementById('bia-save-btn');
    if (btn) { btn.disabled = true; btn.textContent = 'Đang lưu…'; }
    try {
      await window._saveS?.(_S);
      _lastSavedS = JSON.parse(JSON.stringify(_S));
      setBiaPending(false);
    } catch(e) {
      console.error(e);
    } finally {
      if (btn) { btn.disabled = false; btn.textContent = 'Lưu'; }
    }
  };

  document.getElementById('btn-save-match')?.addEventListener('click', async ()=>{
    if(!_S||!window._isLoggedIn?.()) return;
    const date=document.getElementById('match-date').value;
    if(!date){alert('Vui lòng chọn ngày');return;}
    const selected=Array.from(document.querySelectorAll('#loser-checkboxes .loser-toggle'))
      .filter(btn=>btn.dataset.state!=='0')
      .map(btn=>({memberId:parseInt(btn.dataset.mid), paid:btn.dataset.state==='2'}));

    const thuThem=parseInt(document.getElementById('match-thu-them').value)||0;
    const ghiChu=document.getElementById('match-ghi-chu').value.trim();
    const mi=new Date(date).getMonth();
    if(!_S.matches) _S.matches=[];
    if(_editMatchId!==null) {
      const match=_S.matches.find(m=>m.id==_editMatchId);
      if(match) {
        const oldPaid={};(match.losers||[]).forEach(l=>{oldPaid[l.memberId]=l.paid;});
        match.date=date;match.monthIdx=mi;match.thuThem=thuThem;match.ghiChuThem=ghiChu;
        match.losers=selected.map(s=>({memberId:s.memberId,paid:s.paid}));
      }
    } else {
      const newId=(_S.nextMaid||1);
      _S.matches.push({id:newId,date,monthIdx:mi,year:_year,thuThem,ghiChuThem:ghiChu,
        losers:selected.map(s=>({memberId:s.memberId,paid:s.paid}))});
      _S.nextMaid=newId+1;
    }
    _openMonths.add(mi);
    await window._saveS?.(_S);
    _lastSavedS = JSON.parse(JSON.stringify(_S));
    setBiaPending(false);
    closeMatchModal(); renderPage(_S);
  });

  // ── Leaderboard ──────────────────────────────────────────
  function renderLeaderboard(matches, members) {
    const lossMap={};
    matches.forEach(match=>{(match.losers||[]).forEach(l=>{lossMap[l.memberId]=(lossMap[l.memberId]||0)+1;});});
    const ranking=Object.entries(lossMap).map(([id,n])=>({m:members.find(x=>x.id==id),n}))
      .filter(x=>x.m).sort((a,b)=>b.n-a.n).slice(0,5);
    const el=document.getElementById('bia-leaderboard');
    if(!ranking.length){el.innerHTML='<div style="color:var(--text-muted);font-size:13px;text-align:center;padding:24px">Chưa có dữ liệu</div>';return;}
    const podium=ranking.slice(0,3),rest=ranking.slice(3);
    const medals=['🥇','🥈','🥉'];
    const po=podium.length===1?[podium[0]]:podium.length===2?[podium[1],podium[0]]:[podium[1],podium[0],podium[2]];
    const pr=podium.length===1?[0]:podium.length===2?[1,0]:[1,0,2];
    el.innerHTML=`<div class="podium-wrap">${po.map((r,pi)=>{const rank=pr[pi]+1;return`<div class="podium-card podium-card--${rank}"><div class="podium-medal">${medals[rank-1]}</div><div class="podium-name">${r.m.name}</div><div class="podium-losses">${r.n} trận</div></div>`;}).join('')}</div>`
      +(rest.length?`<div style="margin-top:12px;display:flex;flex-direction:column;gap:8px">${rest.map((r,i)=>`<div class="leaderboard-item"><div class="leaderboard-item__rank">${i+4}</div><div class="leaderboard-item__name">${r.m.name}</div><div class="leaderboard-item__losses">${r.n} trận</div></div>`).join('')}</div>`:'');
  }

  // ── Accordion ────────────────────────────────────────────
  function renderAccordion(S) {
    const members=(S.members||[]).filter(m=>m.status!=='left');
    const matches=getYearMatches(S);
    const isAdmin=window._isLoggedIn?.();
    const accordion=document.getElementById('month-accordion');
    accordion.innerHTML='';
    let hasAny=false;

    MONTHS.forEach((mn,mi)=>{
      // Sắp xếp toàn bộ trận trong năm theo ngày tăng dần → tính rank
      const allSorted = matches.slice().sort((a,b)=>(a.date||'').localeCompare(b.date||''));
      const rankMap = {};
      allSorted.forEach((m, i) => { rankMap[m.id] = i + 1; });

      const monthMatches = matches.filter(m=>m.monthIdx===mi)
        .sort((a,b)=>(a.date||'').localeCompare(b.date||'')); // ASC
      if(!monthMatches.length&&!isAdmin) return;
      hasAny=true;
      const isOpen=_openMonths.has(mi);
      let thuBiaMo=0,thuThemMo=0,noBiaMo=0;
      monthMatches.forEach(m=>{(m.losers||[]).forEach(l=>{if(l.paid)thuBiaMo+=FINE;else noBiaMo+=FINE;});thuThemMo+=(m.thuThem||0);});
      const tongMo=thuBiaMo+thuThemMo;

      const summaryChips=monthMatches.length?`<div class="month-summary-chips">
        <span class="month-chip">${monthMatches.length} trận</span>
        <span class="month-chip month-chip--total">Σ: ${fmt(tongMo)}</span>
        ${thuThemMo?`<span class="month-chip month-chip--extra">Thêm: +${fmt(thuThemMo)}</span>`:''}
        ${noBiaMo?`<span class="month-chip month-chip--debt">Nợ: ${fmt(noBiaMo)}</span>`:''}
      </div>`:'';

      const matchesHTML=monthMatches.map(match=>{
        const losersHTML=(match.losers||[]).map(l=>{
          const member=members.find(m=>m.id==l.memberId);
          const cls=l.paid?'loser-paid':'loser-unpaid';
          const icon=l.paid?'solar:check-circle-linear':'solar:close-circle-linear';
          const ca=isAdmin?`onclick="togglePaid(${match.id},${l.memberId})" style="cursor:pointer"`:'';
          return `<span class="loser-chip ${cls}" ${ca}><iconify-icon icon="${icon}" style="font-size:13px"></iconify-icon>${member?.name||'?'}</span>`;
        }).join('');
        const paidCount=(match.losers||[]).filter(l=>l.paid).length;
        const biaMo=paidCount*FINE;
        const noBiaTran=(match.losers||[]).filter(l=>!l.paid).length*FINE;
        const extraHTML=match.thuThem?`<div class="match-item__extra">🎁 Thu thêm: +${fmt(match.thuThem)}${match.ghiChuThem?` — ${match.ghiChuThem}`:''}</div>`:'';
        const adminBtns=isAdmin?`<div style="display:flex;gap:4px;margin-left:auto">
          <button class="btn btn-icon btn-ghost" onclick="openEditMatch(${match.id})" title="Sửa" style="color:var(--color-primary);width:36px;height:36px"><iconify-icon icon="solar:pen-2-linear" style="font-size:16px"></iconify-icon></button>
          <button class="btn btn-icon btn-ghost" onclick="deleteMatch(${match.id})" title="Xoá" style="color:var(--text-muted);width:36px;height:36px"><iconify-icon icon="solar:trash-bin-trash-linear" style="font-size:16px"></iconify-icon></button>
        </div>`:'';
        return `<div class="match-item fade-in">
          <div class="match-item__header">
            <div class="match-item__num">#${rankMap[match.id]||'?'}</div>
            <div class="match-item__date">${fmtDate(match.date)}</div>
            ${adminBtns}
          </div>
          <div class="match-item__losers">${losersHTML}</div>
          ${extraHTML}
          <div class="match-item__summary">Quỹ bia: ${fmt(biaMo)}${noBiaTran?` · <span style="color:var(--color-primary)">Nợ: ${fmt(noBiaTran)}</span>`:''}${match.thuThem?` · Thu thêm: +${fmt(match.thuThem)}`:''}</div>
        </div>`;
      }).join('');

      const addBtn=isAdmin?`<button class="btn btn-outline w-full" onclick="openAddMatch(${mi})" style="justify-content:center;margin-top:4px">
        <iconify-icon icon="solar:add-circle-linear" style="font-size:18px"></iconify-icon>+ Thêm trận ${MONTHS_FULL[mi]}
      </button>`:'';

      const card=document.createElement('div');
      card.className=`month-accordion-card${isOpen?' is-open':''}`;
      card.dataset.mi=mi;
      card.innerHTML=`
        <div class="month-accordion-header" onclick="toggleAccordion(${mi})">
          <span class="month-accordion-title">${MONTHS_FULL[mi]}</span>
          <iconify-icon icon="solar:alt-arrow-down-linear" class="month-accordion-chevron"></iconify-icon>
        </div>
        <div class="month-accordion-body">
          ${summaryChips}
          <div style="display:flex;flex-direction:column;gap:10px">${matchesHTML}</div>
          ${addBtn}
        </div>`;
      accordion.appendChild(card);
    });

    if(!hasAny) {
      accordion.innerHTML=`<div style="text-align:center;color:var(--text-muted);padding:48px 0">
        <iconify-icon icon="solar:cup-star-linear" style="font-size:48px;opacity:.3"></iconify-icon>
        <div style="margin-top:12px">Chưa có trận nào trong năm ${_year}</div>
      </div>`;
    }
  }

  window.toggleAccordion=function(mi){
    if(_openMonths.has(mi))_openMonths.delete(mi);else _openMonths.add(mi);
    const card=document.querySelector(`.month-accordion-card[data-mi="${mi}"]`);
    if(card) card.classList.toggle('is-open',_openMonths.has(mi));
  };

  function renderPage(S) {
    _S=S;
    const members=(S.members||[]).filter(m=>m.status!=='left');
    const matches=getYearMatches(S);
    let thuBia=0,noBia=0; const nguoiNoSet=new Set();
    matches.forEach(m=>{
      (m.losers||[]).forEach(l=>{if(l.paid)thuBia+=FINE;else{noBia+=FINE;nguoiNoSet.add(l.memberId);}});
      thuBia+=(m.thuThem||0);
    });
    document.getElementById('kpi-thu-bia').textContent=fmt(thuBia);
    document.getElementById('kpi-con-no').textContent=fmt(noBia);
    document.getElementById('kpi-so-tran').textContent=matches.length;
    document.getElementById('kpi-nguoi-no').textContent=nguoiNoSet.size;
    renderLeaderboard(matches,members);
    renderAccordion(S);
  }


  window.deleteMatch = function(matchId) {
    if(!window._isLoggedIn?.()||!_S) return;
    const match = (_S.matches||[]).find(m=>m.id==matchId);
    const dateLabel = match?.date ? match.date.split('-').reverse().join('/') : `#${matchId}`;

    // Hiện confirm modal
    const old = document.getElementById('delete-confirm-modal');
    if(old) old.remove();
    const backdrop = document.createElement('div');
    backdrop.id = 'delete-confirm-modal';
    backdrop.className = 'modal-backdrop';
    backdrop.innerHTML = `
      <div class="modal fade-in" style="max-width:380px">
        <div class="modal-handle"></div>
        <div style="text-align:center;margin-bottom:20px">
          <div style="width:56px;height:56px;border-radius:var(--radius-full);background:rgba(224,57,44,.12);
            border:1.5px solid rgba(224,57,44,.3);display:flex;align-items:center;justify-content:center;
            margin:0 auto 16px;font-size:24px">
            <iconify-icon icon="solar:trash-bin-trash-linear" style="color:var(--color-accent-light)"></iconify-icon>
          </div>
          <div style="font-size:17px;font-weight:700;margin-bottom:6px">Xoá trận đấu?</div>
          <div style="font-size:13px;color:var(--text-secondary)">
            Trận ngày <strong style="color:var(--text-primary)">${dateLabel}</strong> sẽ bị xoá vĩnh viễn và không thể khôi phục.
          </div>
        </div>
        <div style="display:flex;gap:10px">
          <button class="btn btn-surface w-full" id="btn-delete-cancel" style="justify-content:center">Huỷ</button>
          <button class="btn btn-primary w-full" id="btn-delete-confirm" style="justify-content:center;background:var(--color-accent);color:#fff">
            <iconify-icon icon="solar:trash-bin-trash-linear" style="font-size:16px;color:#fff"></iconify-icon>
            Xoá
          </button>
        </div>
      </div>`;

    document.body.appendChild(backdrop);

    const close = () => backdrop.remove();
    backdrop.addEventListener('click', e => { if(e.target===backdrop) close(); });
    document.getElementById('btn-delete-cancel').addEventListener('click', close);
    document.getElementById('btn-delete-confirm').addEventListener('click', async () => {
      _S.matches = (_S.matches||[]).filter(m=>m.id!=matchId);
      await window._saveS?.(_S);
      close();
      renderPage(_S);
    });
  };

  function updateYearUI(){
    const sel=document.getElementById('year-select');
    if(sel){
      const curY=new Date().getFullYear(),minY=BASE_YEAR,maxY=Math.max(curY+1,BASE_YEAR);
      sel.innerHTML='';
      for(let y=maxY;y>=minY;y--){const opt=document.createElement('option');opt.value=y;opt.textContent=y;if(y===_year)opt.selected=true;sel.appendChild(opt);}
    }
    window._currentYear=_year;
  }

  window.onComponentsReady=function(){
    updateYearUI();
    document.getElementById('year-select')?.addEventListener('change',e=>{
      _year=parseInt(e.target.value)||BASE_YEAR; updateYearUI(); if(_S) renderPage(_S);
    });
    document.getElementById('page-content').style.opacity='1';
  };
  window._onDataReady=function(S){
    _lastSavedS = JSON.parse(JSON.stringify(S));
    renderPage(S);
  };
  window._onAuthChange=function(){if(_S)renderPage(_S);};
</script>
<div class="sheet-backdrop" id="login-modal" style="display:none" role="dialog" aria-modal="true">
  <div class="sheet fade-in">
    <div class="modal-handle" style="display:block"></div>
    <h2 class="modal-title">Đăng nhập</h2>
    <div style="display:flex;flex-direction:column;gap:16px">
      <div class="field">
        <label for="login-email">Email</label>
        <input class="input" type="email" id="login-email" placeholder="email@example.com" autocomplete="username">
      </div>
      <div class="field">
        <label for="login-password">Mật khẩu</label>
        <input class="input" type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <div id="login-error" style="display:none;background:rgba(224,57,44,.12);border:1px solid rgba(224,57,44,.3);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--color-accent-light)">
        <iconify-icon icon="solar:close-circle-linear" style="vertical-align:middle;margin-right:4px"></iconify-icon>
        <span id="login-error-msg">Email hoặc mật khẩu không đúng.</span>
      </div>
      <div style="display:flex;gap:12px;margin-top:4px">
        <button class="btn btn-primary w-full" id="btn-login-submit" style="justify-content:center">
          <iconify-icon icon="solar:lock-unlocked-linear" style="font-size:18px"></iconify-icon>
          Đăng nhập
        </button>
        <button class="btn btn-ghost" id="btn-login-cancel" style="flex-shrink:0">Huỷ</button>
      </div>
    </div>
  </div>
</div>
</body>
</html>
