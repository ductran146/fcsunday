<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <script>
    /* Theme: apply trước khi render để tránh flash */
    (function(){
      var t = localStorage.getItem('fc-sunday-theme');
      if (t === 'light') document.documentElement.setAttribute('data-theme','light');
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="theme-color" content="#0C0C0F">
  <title>FC Sunday — Thu hàng tháng</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js" defer></script>
  <style>
    .thu-thang-table td, .thu-thang-table th { min-width: 52px; text-align: center; }
    .thu-thang-table th.month-col, .thu-thang-table td.month-col { width: 60px; min-width: 60px; max-width: 60px; }
    .thu-thang-table th.stt-col, .thu-thang-table td.stt-col { width: 44px; min-width: 44px; max-width: 44px; text-align: center; }
    .thu-thang-table th.name-col, .thu-thang-table td.name-col { text-align: left; min-width: 120px; }
    .cell-btn {
      width: 40px; height: 32px;
      border-radius: var(--radius-sm);
      border: none; cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 600;
      transition: background .12s, transform .1s;
    }
    .cell-btn:active { transform: scale(.93); }
    .cell-paid-btn    { background: rgba(46,204,113,.15); color: var(--color-success); }
    .cell-unpaid-btn  { background: rgba(224,57,44,.1);  color: var(--text-muted); }
    .cell-exempt-btn  { background: rgba(255,192,46,.1); color: var(--color-primary); font-style: italic; }
    .cell-future-btn  { opacity: .72; }
    .summary-row td   { background: var(--bg-elevated) !important; font-weight: 700; }
  </style>
</head>
<body data-active="thu-thang">
<div class="app-shell">
  <div data-component="sidebar"></div>
  <div class="main-content">
    <div data-component="header" data-title="Thu hàng tháng"></div>
    <main class="page" id="page-content" style="opacity:0;transition:opacity .2s">

      <!-- Header row -->
      <div class="thu-thang-page-header">
        <div class="thu-thang-page-title">
          <div class="section-overline">Quỹ tháng</div>
          <h1 class="text-h1">Thu hàng tháng</h1>
          <div class="thu-thang-page-subtitle">200.000 / người / tháng</div>
        </div>
        <select class="year-selector thu-thang-year-selector" id="year-select">
          <!-- options injected by JS -->
        </select>
      </div>

      <!-- KPI quick -->
      <div class="grid-2 thu-thang-kpi-grid" style="margin-bottom:24px">
        <div class="kpi-card kpi-card--gold">
          <div class="kpi-card__label">Đã thu</div>
          <div class="kpi-card__value" id="kpi-da-thu">0</div>
        </div>
        <div class="kpi-card kpi-card--red">
          <div class="kpi-card__label">Còn thiếu</div>
          <div class="kpi-card__value" id="kpi-con-thieu">0</div>
        </div>
      </div>

      <!-- Legend -->
      <div style="display:flex;flex-wrap:wrap;gap:12px;margin-bottom:16px;font-size:12px">
        <div style="display:flex;align-items:center;gap:6px"><span style="width:12px;height:12px;border-radius:4px;background:rgba(46,204,113,.15);display:inline-block;border:1px solid rgba(46,204,113,.3)"></span><span style="color:var(--text-secondary)">Đã đóng</span></div>
        <div style="display:flex;align-items:center;gap:6px"><span style="width:12px;height:12px;border-radius:4px;background:rgba(224,57,44,.1);display:inline-block;border:1px solid rgba(224,57,44,.2)"></span><span style="color:var(--text-secondary)">Chưa đóng</span></div>
        <div style="display:flex;align-items:center;gap:6px"><span style="width:12px;height:12px;border-radius:4px;background:rgba(255,192,46,.1);display:inline-block;border:1px solid rgba(255,192,46,.2)"></span><span style="color:var(--text-secondary)">Miễn</span></div>

      <div class="save-bar" id="thu-thang-save-bar" hidden>
        <button class="save-bar__btn save-bar__btn--cancel" id="thu-thang-cancel-btn" type="button" onclick="cancelMonthlyChanges()">Huỷ</button>
        <button class="save-bar__btn save-bar__btn--save" id="thu-thang-save-btn" type="button" onclick="saveMonthlyChanges()">Lưu</button>
      </div>

      <!-- Table -->
      <div class="table-wrap">
        <table class="fc-table thu-thang-table" id="thu-thang-table">
          <thead>
            <tr id="thu-thang-head">
              <th class="sticky-col stt-col">STT</th>
              <th class="sticky-col name-col">Thành viên</th>
              <!-- months injected by JS -->
              <th>Tổng nợ</th>
            </tr>
          </thead>
          <tbody id="thu-thang-tbody">
            <tr><td colspan="15" style="text-align:center;color:var(--text-muted);padding:32px">Đang tải…</td></tr>
          </tbody>
        </table>
      </div>

    </main>
  </div>
  <div data-component="bottom-nav"></div>
</div>
<div data-component="login-modal"></div>
<script src="app.js" defer></script>
<script src="components/components-loader.js" defer></script>
<script>
  const MONTHS = ['T1','T2','T3','T4','T5','T6','T7','T8','T9','T10','T11','T12'];
  const FEE = 200000, BASE_YEAR = 2026;
  let _year = BASE_YEAR, _S = null, _lastSavedS = null, _hasMonthlyChanges = false;
  const curMonth = new Date().getMonth(); // 0-based
  const curYear  = new Date().getFullYear();

  function fmt(n) { return new Intl.NumberFormat('vi-VN').format(n); }
  function cloneState(obj) { return JSON.parse(JSON.stringify(obj || {})); }

  function getKey(memberId) {
    return _year === BASE_YEAR ? String(memberId) : `${memberId}_${_year}`;
  }

  function renderTable(S) {
    _S = S;
    const members = (S.members || [])
      .filter(m => m.status !== 'left')
      .slice()
      .sort((a, b) => String(a.name || '').localeCompare(String(b.name || ''), 'vi', { sensitivity: 'base' }));
    const isAdmin = window._isLoggedIn?.();

    // Build month headers
    const head = document.getElementById('thu-thang-head');
    head.innerHTML = `<th class="sticky-col stt-col">STT</th><th class="sticky-col name-col">Thành viên</th>` +
      MONTHS.map((m,i) => `<th class="month-col">${m}</th>`).join('') +
      `<th>Tổng nợ</th>`;

    // Build rows
    let totalDaThu = 0, totalConNo = 0, totalObligated = 0;
    const rows = members.map((m, index) => {
      const key = getKey(m.id);
      const arr = S.thuThang?.[key] || Array(12).fill(0);
      let memberDaThu = 0, memberNo = 0;

      const cells = arr.map((v, mi) => {
        const isFuture = _year > curYear || (_year === curYear && mi > curMonth);
        let cls = '', label = '', nextV = 0;
        if (v === 1) {
          cls = 'cell-paid-btn';
          label = '✓';
          memberDaThu += FEE;
        } else if (v === 2) {
          cls = 'cell-exempt-btn';
          label = '—';
        } else {
          cls = 'cell-unpaid-btn';
          label = '✗';
          // Tháng tương lai vẫn cho chọn trước nhưng không tính vào còn thiếu
          if (!isFuture) memberNo += FEE;
        }
        if (isFuture) cls += ' cell-future-btn';

        // Cycle: 0→1→2→0
        nextV = v === 0 ? 1 : v === 1 ? 2 : 0;

        const clickAttr = isAdmin
          ? `onclick="toggleCell(${m.id},${mi},${nextV})" style="cursor:pointer"`
          : '';
        const title = `${MONTHS[mi]}${isFuture ? ' · tháng tương lai' : ''}`;
        return `<td class="month-col"><button class="cell-btn ${cls}" ${clickAttr} title="${title}" data-mid="${m.id}" data-mi="${mi}">${label}</button></td>`;
      }).join('');

      totalDaThu += memberDaThu;
      totalConNo += memberNo;
      if (m.status === 'active') totalObligated += arr.filter(v => v !== 2 && !arr[12]).length * FEE; // simplified

      const noColor = memberNo > 0 ? 'color:var(--color-accent-light)' : 'color:var(--color-success)';
      return `<tr>
        <td class="sticky-col stt-col stt-cell">${index + 1}</td>
        <td class="sticky-col name-col member-name-cell"><span>${m.name}</span></td>
        ${cells}
        <td style="${noColor};font-weight:700">${memberNo > 0 ? fmt(memberNo) : '✓'}</td>
      </tr>`;
    }).join('');

    // Summary row — chỉ hiện tổng thu cuối, các tháng để trống
    const emptyMonths = MONTHS.map(() => `<td></td>`).join('');

    document.getElementById('thu-thang-tbody').innerHTML = rows +
      `<tr class="summary-row">
        <td class="sticky-col stt-col"></td>
        <td class="sticky-col name-col" style="font-weight:800">Tổng thu</td>
        ${emptyMonths}
        <td style="font-weight:800;color:var(--color-primary)">${fmt(totalDaThu)}</td>
      </tr>`;

    // KPI
    document.getElementById('kpi-da-thu').textContent    = fmt(totalDaThu);
    document.getElementById('kpi-con-thieu').textContent = fmt(totalConNo);
  }

  function setMonthlyPending(hasChanges) {
    _hasMonthlyChanges = !!hasChanges;
    const bar = document.getElementById('thu-thang-save-bar');
    if (bar) bar.hidden = !_hasMonthlyChanges;
  }

  function showThuThangToast(message) {
    const oldToast = document.querySelector('.thu-thang-toast');
    if (oldToast) oldToast.remove();
    const toast = document.createElement('div');
    toast.className = 'thu-thang-toast';
    toast.textContent = message;
    document.body.appendChild(toast);
    requestAnimationFrame(() => toast.classList.add('is-visible'));
    setTimeout(() => {
      toast.classList.remove('is-visible');
      setTimeout(() => toast.remove(), 180);
    }, 2200);
  }

  window.toggleCell = function(memberId, monthIdx, newVal) {
    if (!window._isLoggedIn?.()) return;
    const key = getKey(memberId);
    const arr = (_S.thuThang?.[key] || Array(12).fill(0)).slice();
    arr[monthIdx] = newVal;
    if (!_S.thuThang) _S.thuThang = {};
    _S.thuThang[key] = arr;
    setMonthlyPending(true);
    renderTable(_S);
  };

  window.cancelMonthlyChanges = function() {
    if (!_hasMonthlyChanges || !_lastSavedS) return;
    _S = cloneState(_lastSavedS);
    setMonthlyPending(false);
    renderTable(_S);
  };

  window.saveMonthlyChanges = async function() {
    if (!_hasMonthlyChanges || !_S) return;
    if (!window._isLoggedIn?.()) return;
    const btn = document.getElementById('thu-thang-save-btn');
    if (btn) {
      btn.disabled = true;
      btn.dataset.originalText = btn.innerHTML;
      btn.innerHTML = 'Đang lưu';
    }
    try {
      await window._saveS?.(_S);
      _lastSavedS = cloneState(_S);
      setMonthlyPending(false);
      showThuThangToast('Đã cập nhật thu tháng');
    } catch (err) {
      console.error(err);
      showThuThangToast('Không lưu được thay đổi');
    } finally {
      if (btn) {
        btn.disabled = false;
        btn.innerHTML = btn.dataset.originalText || 'Lưu';
      }
    }
  };

  function updateYearUI() {
    const sel = document.getElementById('year-select');
    if (sel) {
      const curY = new Date().getFullYear();
      const minY = BASE_YEAR;
      const maxY = Math.max(curY + 1, BASE_YEAR);
      sel.innerHTML = '';
      for (let y = maxY; y >= minY; y--) {
        const opt = document.createElement('option');
        opt.value = y;
        opt.textContent = y;
        if (y === _year) opt.selected = true;
        sel.appendChild(opt);
      }
    }
    window._currentYear = _year;
  }

  window.onComponentsReady = function () {
    updateYearUI();
    document.getElementById('year-select')?.addEventListener('change', (e) => {
      _year = parseInt(e.target.value, 10) || BASE_YEAR;
      updateYearUI();
      if (_S) {
        if (_hasMonthlyChanges && _lastSavedS) _S = cloneState(_lastSavedS);
        setMonthlyPending(false);
        renderTable(_S);
      }
    });
    document.getElementById('page-content').style.opacity = '1';
  };

  window._onDataReady = function(S) {
    _lastSavedS = cloneState(S);
    setMonthlyPending(false);
    renderTable(cloneState(S));
  };
  window._onAuthChange = function() { if(_S) renderTable(_S); };
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .catch(err => console.warn('SW register failed:', err));
    });
  }
</script>
</body>
</html>
